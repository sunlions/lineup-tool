<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏸 排兵布阵系统</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js">
    </script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #f0f4f8;
            padding: 16px;
            min-height: 100vh;
        }
        .app {
            max-width: 1100px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            margin-bottom: 20px;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .flex {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        h1 {
            font-size: 26px;
            color: #1a202c;
        }
        h2 {
            font-size: 18px;
            color: #2d3748;
            margin-bottom: 12px;
        }
        h3 {
            font-size: 15px;
            color: #4a5568;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #718096;
            font-size: 14px;
        }
        .text-muted {
            color: #718096;
            font-size: 14px;
        }
        .text-sm {
            font-size: 13px;
        }
        .hidden {
            display: none !important;
        }
        .mt-12 {
            margin-top: 12px;
        }
        .mb-12 {
            margin-bottom: 12px;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 768px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }
        }

        .form-group {
            margin-bottom: 14px;
        }
        label {
            display: block;
            font-weight: 600;
            color: #2d3748;
            font-size: 14px;
            margin-bottom: 4px;
        }
        input,
        select {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 15px;
            background: white;
        }
        input:focus,
        select:focus {
            border-color: #4299e1;
            outline: none;
        }

        .btn {
            padding: 10px 22px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn:active {
            transform: scale(0.97);
        }
        .btn-primary {
            background: #4299e1;
            color: white;
        }
        .btn-primary:hover {
            background: #3182ce;
        }
        .btn-success {
            background: #48bb78;
            color: white;
        }
        .btn-success:hover {
            background: #38a169;
        }
        .btn-danger {
            background: #fc8181;
            color: white;
        }
        .btn-danger:hover {
            background: #f56565;
        }
        .btn-outline {
            background: transparent;
            border: 2px solid #e2e8f0;
            color: #4a5568;
        }
        .btn-outline:hover {
            background: #f7fafc;
        }
        .btn-sm {
            padding: 6px 14px;
            font-size: 13px;
        }
        .btn-block {
            width: 100%;
            justify-content: center;
        }
        .btn-purple {
            background: #9f7aea;
            color: white;
        }
        .btn-purple:hover {
            background: #805ad5;
        }

        .team-selector {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .team-tab {
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            background: #edf2f7;
            font-weight: 500;
            border: 2px solid transparent;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .team-tab:hover {
            background: #e2e8f0;
        }
        .team-tab.active {
            background: #4299e1;
            color: white;
            border-color: #4299e1;
        }
        .team-tab .count {
            font-size: 12px;
            opacity: 0.7;
            margin-left: 4px;
        }
        .team-tab .delete-team-btn {
            background: none;
            border: none;
            color: #a0aec0;
            cursor: pointer;
            font-size: 16px;
            padding: 0 2px;
        }
        .team-tab .delete-team-btn:hover {
            color: #e53e3e;
        }

        .member-tag {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #edf2f7;
            padding: 6px 14px 6px 18px;
            border-radius: 20px;
            margin: 4px 6px 4px 0;
            font-size: 14px;
        }
        .member-tag .gender-badge {
            font-size: 11px;
            padding: 1px 8px;
            border-radius: 12px;
            font-weight: 700;
        }
        .gender-m {
            background: #bee3f8;
            color: #2b6cb0;
        }
        .gender-f {
            background: #fbb6ce;
            color: #b83280;
        }
        .member-tag .remove-btn {
            cursor: pointer;
            color: #a0aec0;
            font-weight: 700;
            font-size: 18px;
            background: none;
            border: none;
            padding: 0 4px;
        }
        .member-tag .remove-btn:hover {
            color: #e53e3e;
        }

        .member-list {
            min-height: 60px;
            background: #f7fafc;
            border-radius: 12px;
            padding: 12px;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            gap: 4px;
        }
        .member-list .empty {
            width: 100%;
            text-align: center;
            color: #a0aec0;
            padding: 16px 0;
            font-size: 14px;
        }

        .tab-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .tab {
            padding: 8px 22px;
            border-radius: 20px;
            cursor: pointer;
            background: #edf2f7;
            font-weight: 500;
            border: none;
            font-size: 14px;
        }
        .tab.active {
            background: #4299e1;
            color: white;
        }
        .tab:hover:not(.active) {
            background: #e2e8f0;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #1a202c;
            color: white;
            padding: 12px 28px;
            border-radius: 12px;
            font-weight: 500;
            opacity: 0;
            transition: 0.3s;
            pointer-events: none;
            z-index: 999;
            font-size: 14px;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #a0aec0;
        }
        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-blue {
            background: #bee3f8;
            color: #2b6cb0;
        }
        .badge-green {
            background: #c6f6d5;
            color: #276749;
        }
        .badge-purple {
            background: #e9d8fd;
            color: #6b46c1;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal-box {
            background: white;
            border-radius: 20px;
            padding: 32px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .lineup-step-card {
            background: #f7fafc;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            border-left: 4px solid #4299e1;
        }
        .lineup-step-card .step-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .lineup-step-card .step-number {
            font-weight: 700;
            font-size: 16px;
            color: #2d3748;
        }
        .lineup-step-card .step-action {
            font-size: 13px;
            padding: 2px 12px;
            border-radius: 12px;
            background: #ebf8ff;
            color: #2b6cb0;
        }
        .lineup-step-card .step-action.start {
            background: #c6f6d5;
            color: #276749;
        }
        .lineup-step-card .court-players {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        .lineup-step-card .court-player {
            background: white;
            padding: 6px 18px;
            border-radius: 12px;
            border: 2px solid #4299e1;
            font-weight: 600;
            font-size: 14px;
        }
        .lineup-step-card .court-player.male {
            border-color: #4299e1;
            background: #ebf8ff;
        }
        .lineup-step-card .court-player.female {
            border-color: #ed64a6;
            background: #fff5f7;
        }
        .lineup-step-card .sub-info {
            font-size: 13px;
            color: #e53e3e;
            margin-top: 6px;
        }

        .member-select-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 12px;
            background: #f7fafc;
            border-radius: 10px;
            min-height: 60px;
        }
        .member-select-grid .member-option {
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            background: white;
            border: 2px solid #e2e8f0;
            font-size: 14px;
            transition: 0.2s;
        }
        .member-select-grid .member-option:hover:not(.disabled) {
            border-color: #4299e1;
            background: #ebf8ff;
        }
        .member-select-grid .member-option.selected {
            border-color: #4299e1;
            background: #4299e1;
            color: white;
        }
        .member-select-grid .member-option.disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .court-slots {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            padding: 12px;
            background: #f7fafc;
            border-radius: 10px;
            margin-bottom: 12px;
        }
        .court-slot {
            background: white;
            border: 2px dashed #cbd5e0;
            border-radius: 12px;
            padding: 10px 24px;
            min-width: 100px;
            text-align: center;
            flex: 1;
        }
        .court-slot.filled {
            border-style: solid;
            border-color: #4299e1;
            background: #ebf8ff;
        }
        .court-slot .slot-label {
            font-size: 12px;
            color: #a0aec0;
        }
        .court-slot .slot-name {
            font-weight: 700;
            font-size: 18px;
            color: #2d3748;
        }

        .qr-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background: #f7fafc;
            border-radius: 16px;
        }
        #qrcode {
            background: white;
            padding: 12px;
            border-radius: 12px;
        }
        .share-link {
            margin-top: 12px;
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 450px;
        }
        .share-link input {
            flex: 1;
            background: white;
            font-size: 13px;
        }

        .fill-container .step-indicator {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 16px;
        }
        .fill-container .step-dot {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #edf2f7;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 13px;
            color: #a0aec0;
        }
        .fill-container .step-dot.active {
            background: #4299e1;
            color: white;
        }
        .fill-container .step-dot.done {
            background: #48bb78;
            color: white;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        .data-table th {
            background: #f7fafc;
            padding: 10px 12px;
            text-align: left;
            border-bottom: 2px solid #e2e8f0;
        }
        .data-table td {
            padding: 8px 12px;
            border-bottom: 1px solid #e2e8f0;
        }

        .gender-select-group {
            display: flex;
            gap: 12px;
            margin: 12px 0;
        }
        .gender-select-group .gender-btn {
            padding: 8px 24px;
            border-radius: 20px;
            border: 2px solid #e2e8f0;
            background: white;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            flex: 1;
        }
        .gender-select-group .gender-btn:hover {
            border-color: #4299e1;
        }
        .gender-select-group .gender-btn.active-male {
            border-color: #4299e1;
            background: #ebf8ff;
            color: #2b6cb0;
        }
        .gender-select-group .gender-btn.active-female {
            border-color: #ed64a6;
            background: #fff5f7;
            color: #b83280;
        }
        .gender-select-group .gender-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .connection-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            padding: 4px 12px;
            border-radius: 12px;
            background: #c6f6d5;
            color: #276749;
        }
        .connection-status .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            background: #38a169;
        }

        .version-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: #f7fafc;
            border-radius: 10px;
            margin-bottom: 8px;
            border-left: 4px solid #805ad5;
            flex-wrap: wrap;
            gap: 8px;
        }
        .version-item .version-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .version-item .version-info .version-time {
            font-size: 13px;
            color: #2d3748;
            font-weight: 600;
        }
        .version-item .version-info .version-note {
            font-size: 12px;
            color: #718096;
        }
        .version-item .version-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .version-item .version-actions .btn {
            padding: 4px 12px;
            font-size: 12px;
        }
        .version-item.current-version {
            border-left-color: #48bb78;
            background: #f0fff4;
        }
    </style>
</head>
<body>

    <div class="app" id="app">
        <div class="toast" id="toast"></div>

        <!-- Header -->
        <div class="card">
            <div class="flex-between">
                <div>
                    <h1>🏸 排兵布阵系统</h1>
                    <p class="subtitle">本地版 · 多版本记录</p>
                </div>
                <div class="flex">
                    <span class="connection-status">
                        <span class="dot"></span> 数据存于本地
                    </span>
                    <button class="btn btn-outline btn-sm" id="exportBtn">💾 导出</button>
                    <button class="btn btn-outline btn-sm" id="importBtn">📥 导入</button>
                    <input type="file" id="importFile" accept=".json" style="display:none">
                </div>
            </div>
        </div>

        <!-- 团队切换 -->
        <div class="card">
            <div class="flex-between">
                <div class="team-selector" id="teamSelector"></div>
                <button class="btn btn-primary btn-sm" id="addTeamBtn">➕ 新建团队</button>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tab-bar">
            <button class="tab active" data-tab="members">👥 成员</button>
            <button class="tab" data-tab="fill">📝 填报</button>
            <button class="tab" data-tab="versions">📚 历史版本</button>
            <button class="tab" data-tab="share">📱 二维码</button>
        </div>

        <!-- ===== TAB 1: 成员管理 ===== -->
        <div class="card" id="tab-members">
            <div class="grid-2">
                <div>
                    <h2>➕ 添加成员</h2>
                    <p class="subtitle" style="margin-bottom:12px;">当前：<strong id="currentTeamName">-</strong></p>
                    <div class="form-group">
                        <label>👤 姓名</label>
                        <input type="text" id="memberName" placeholder="输入姓名">
                    </div>
                    <div class="form-group">
                        <label>⚧ 性别</label>
                        <select id="memberGender">
                            <option value="male">♂ 男</option>
                            <option value="female">♀ 女</option>
                        </select>
                    </div>
                    <button class="btn btn-primary btn-block" id="addMemberBtn">➕ 添加</button>
                    <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;">
                        <button class="btn btn-sm btn-outline" id="loadExampleBtn">📥 示例</button>
                        <button class="btn btn-sm btn-danger" id="clearMembersBtn">🗑 清空</button>
                    </div>
                </div>
                <div>
                    <div class="flex-between mb-12">
                        <span style="font-weight:600;">成员 · <span id="memberCount">0</span> 人</span>
                        <span class="text-muted" id="genderStats">👨 0 · 👩 0</span>
                    </div>
                    <div class="member-list" id="memberList">
                        <div class="empty">还没有成员</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ===== TAB 2: 填报排阵 ===== -->
        <div class="card hidden" id="tab-fill">
            <div class="flex-between mb-12">
                <h2>📝 填报出场名单</h2>
                <div class="flex">
                    <span class="text-muted text-sm">当前：<strong id="fillTeamName">-</strong></span>
                    <button class="btn btn-danger btn-sm" id="resetFillBtn">🔄 重置</button>
                    <button class="btn btn-success btn-sm" id="saveVersionBtn">💾 保存版本</button>
                </div>
            </div>
            <div id="fillContainer">
                <div class="empty-state"><div class="icon">📝</div><p>请先添加成员</p></div>
            </div>
        </div>

        <!-- ===== TAB 3: 历史版本 ===== -->
        <div class="card hidden" id="tab-versions">
            <div class="flex-between mb-12">
                <h2>📚 历史排阵版本</h2>
                <div class="flex">
                    <span class="text-muted text-sm" id="versionCount">共 0 个版本</span>
                    <button class="btn btn-danger btn-sm" id="clearVersionsBtn">🗑 清空所有</button>
                </div>
            </div>
            <div id="versionContainer">
                <div class="empty-state"><div class="icon">📚</div><p>暂无历史版本</p></div>
            </div>
        </div>

        <!-- ===== TAB 4: 二维码 ===== -->
        <div class="card hidden" id="tab-share">
            <p class="text-muted" style="margin-bottom:16px;">生成二维码，扫码填报</p>
            <div class="qr-box">
                <div id="qrcode"></div>
                <div class="share-link">
                    <input type="text" id="shareLink" readonly placeholder="生成后显示链接">
                    <button class="btn btn-primary" id="copyShareBtn">📋 复制</button>
                </div>
                <button class="btn btn-success" id="generateQRBtn">🔄 生成二维码</button>
            </div>
            <div class="mt-12" style="background:#ebf8ff;padding:14px 18px;border-radius:12px;border-left:4px solid #4299e1;">
                <p style="font-size:14px;color:#2b6cb0;">💡 首发1男1女 → 之后每次换1人（同性别替补）</p>
            </div>
        </div>
    </div>

    <!-- ===== 新建团队弹窗 ===== -->
    <div class="modal-overlay" id="addTeamModal">
        <div class="modal-box">
            <h2>🏷️ 新建团队</h2>
            <p class="text-muted" style="margin-bottom:16px;">输入团队名称</p>
            <div class="form-group">
                <label>名称</label>
                <input type="text" id="newTeamNameInput" placeholder="例如：红队">
            </div>
            <div style="display:flex;gap:10px;margin-top:8px;">
                <button class="btn btn-primary" style="flex:1;" id="confirmTeamBtn">✅ 创建</button>
                <button class="btn btn-outline" style="flex:1;" id="closeTeamBtn">取消</button>
            </div>
        </div>
    </div>

    <!-- ===== 删除团队确认 ===== -->
    <div class="modal-overlay" id="deleteTeamModal">
        <div class="modal-box">
            <div style="font-size:48px;text-align:center;margin-bottom:12px;">⚠️</div>
            <div style="text-align:center;color:#e53e3e;font-weight:600;margin-bottom:8px;">确定删除该团队？</div>
            <div class="text-muted text-sm" style="text-align:center;margin-bottom:16px;" id="deleteTeamDetail">不可恢复！</div>
            <div style="display:flex;gap:10px;">
                <button class="btn btn-danger" style="flex:1;" id="confirmDeleteBtn">🗑 确认</button>
                <button class="btn btn-outline" style="flex:1;" id="closeDeleteBtn">取消</button>
            </div>
        </div>
    </div>

    <!-- ===== 查看版本弹窗 ===== -->
    <div class="modal-overlay" id="viewVersionModal">
        <div class="modal-box" style="max-width:600px;">
            <div class="flex-between mb-12">
                <h2 style="margin-bottom:0;" id="viewVersionTitle">📋 版本详情</h2>
                <button class="btn btn-sm btn-outline" id="closeViewBtn">✕</button>
            </div>
            <div id="viewVersionContent" style="max-height:400px;overflow-y:auto;"></div>
            <div style="display:flex;gap:10px;margin-top:16px;">
                <button class="btn btn-success btn-sm" style="flex:1;" id="restoreVersionBtn">🔄 恢复此版本</button>
                <button class="btn btn-outline btn-sm" style="flex:1;" id="closeViewBtn2">关闭</button>
            </div>
        </div>
    </div>

    <!-- ===== 保存版本弹窗 ===== -->
    <div class="modal-overlay" id="saveVersionModal">
        <div class="modal-box">
            <h2 style="margin-bottom:12px;">💾 保存版本</h2>
            <p class="text-muted" style="margin-bottom:16px;">为当前排阵添加备注</p>
            <div class="form-group">
                <label>版本备注（可选）</label>
                <input type="text" id="versionNoteInput" placeholder="例如：第一局、决赛...">
            </div>
            <div style="display:flex;gap:10px;margin-top:8px;">
                <button class="btn btn-success" style="flex:1;" id="confirmSaveVersionBtn">💾 保存</button>
                <button class="btn btn-outline" style="flex:1;" id="cancelSaveVersionBtn">取消</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        //  数据层
        // ============================================================
        var STORAGE_KEY = 'lineup_local_system_v5';

        function getAppData() {
            try {
                var raw = localStorage.getItem(STORAGE_KEY);
                if (raw) {
                    var data = JSON.parse(raw);
                    if (data.teams && data.currentTeamId !== undefined) {
                        return data;
                    }
                }
            } catch (e) { console.error('数据解析失败', e); }
            return {
                teams: [],
                currentTeamId: null,
                fillData: {},
                versions: {}
            };
        }

        function saveAppData(data) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            // 延迟执行渲染，确保 DOM 已更新
            setTimeout(function() {
                renderAll();
            }, 50);
        }

        function getCurrentTeam() {
            var data = getAppData();
            if (!data.currentTeamId && data.teams.length > 0) {
                data.currentTeamId = data.teams[0].id;
                saveAppData(data);
            }
            for (var i = 0; i < data.teams.length; i++) {
                if (data.teams[i].id === data.currentTeamId) return data.teams[i];
            }
            return data.teams[0] || null;
        }

        function getTeam(teamId) {
            var data = getAppData();
            for (var i = 0; i < data.teams.length; i++) {
                if (data.teams[i].id === teamId) return data.teams[i];
            }
            return null;
        }

        function getFillData(teamId) {
            var data = getAppData();
            if (!data.fillData[teamId]) {
                data.fillData[teamId] = { steps: [], currentCourt: [], usedPlayers: [], completed: false };
                saveAppData(data);
            }
            return data.fillData[teamId];
        }

        function saveFillData(teamId, fillData) {
            var data = getAppData();
            data.fillData[teamId] = fillData;
            saveAppData(data);
        }

        function getVersions(teamId) {
            var data = getAppData();
            if (!data.versions[teamId]) {
                data.versions[teamId] = [];
                saveAppData(data);
            }
            return data.versions[teamId];
        }

        function saveVersions(teamId, versions) {
            var data = getAppData();
            data.versions[teamId] = versions;
            saveAppData(data);
        }

        // ============================================================
        //  Toast
        // ============================================================
        var toastTimer = null;

        function showToast(msg) {
            var el = document.getElementById('toast');
            if (!el) return;
            el.textContent = msg;
            el.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(function() { el.classList.remove('show'); }, 3000);
        }

        // ============================================================
        //  渲染所有
        // ============================================================
        function renderAll() {
            console.log('🔄 renderAll 被调用');
            renderTeams();
            renderMembers();
            renderFillPage();
            renderVersions();
        }

        // ============================================================
        //  Tab切换
        // ============================================================
        function switchTab(tab) {
            var tabs = document.querySelectorAll('.tab');
            for (var i = 0; i < tabs.length; i++) {
                tabs[i].classList.toggle('active', tabs[i].dataset.tab === tab);
            }
            var cards = document.querySelectorAll('.card[id^="tab-"]');
            for (var i = 0; i < cards.length; i++) {
                cards[i].classList.toggle('hidden', cards[i].id !== 'tab-' + tab);
            }
            renderAll();
        }

        // ============================================================
        //  团队管理
        // ============================================================
        function renderTeams() {
            var data = getAppData();
            var container = document.getElementById('teamSelector');
            if (!container) return;

            if (data.teams.length === 0) {
                container.innerHTML = '<span class="text-muted text-sm">暂无团队，请创建</span>';
                document.getElementById('currentTeamName').textContent = '-';
                document.getElementById('fillTeamName').textContent = '-';
                return;
            }

            var html = '';
            for (var i = 0; i < data.teams.length; i++) {
                var team = data.teams[i];
                var active = team.id === data.currentTeamId ? 'active' : '';
                var vCount = data.versions[team.id] ? data.versions[team.id].length : 0;
                html += '<span class="team-tab ' + active + '">' +
                    '<span onclick="switchTeam(\'' + team.id + '\')">' +
                    team.name +
                    '<span class="count">(' + (team.members ? team.members.length : 0) + ')</span>' +
                    (vCount > 0 ? ' <span style="font-size:10px;background:#e9d8fd;padding:0 8px;border-radius:10px;color:#6b46c1;">' +
                        vCount + '</span>' : '') +
                    '</span>' +
                    '<button class="delete-team-btn" onclick="event.stopPropagation();showDeleteTeamModal(\'' + team.id +
                    '\')">×</button>' +
                    '</span>';
            }
            container.innerHTML = html;

            var current = getCurrentTeam();
            document.getElementById('currentTeamName').textContent = current ? current.name : '-';
            document.getElementById('fillTeamName').textContent = current ? current.name : '-';
        }

        function switchTeam(teamId) {
            var data = getAppData();
            data.currentTeamId = teamId;
            saveAppData(data);
            renderAll();
            document.getElementById('qrcode').innerHTML = '';
            document.getElementById('shareLink').value = '';
        }

        function showAddTeamModal() {
            document.getElementById('addTeamModal').classList.add('show');
            document.getElementById('newTeamNameInput').value = '';
            setTimeout(function() { document.getElementById('newTeamNameInput').focus(); }, 100);
        }

        function closeAddTeamModal() {
            document.getElementById('addTeamModal').classList.remove('show');
        }

        function confirmAddTeam() {
            var input = document.getElementById('newTeamNameInput');
            var name = input.value.trim();
            if (!name) { showToast('请输入名称'); return; }

            var data = getAppData();
            for (var i = 0; i < data.teams.length; i++) {
                if (data.teams[i].name === name) { showToast('名称已存在'); return; }
            }

            var newTeam = {
                id: 'team_' + Date.now(),
                name: name,
                members: []
            };
            data.teams.push(newTeam);
            data.currentTeamId = newTeam.id;
            data.fillData[newTeam.id] = { steps: [], currentCourt: [], usedPlayers: [], completed: false };
            data.versions[newTeam.id] = [];
            saveAppData(data);
            closeAddTeamModal();
            showToast('✅ 已创建 "' + name + '"');
        }

        // ============================================================
        //  删除团队
        // ============================================================
        var pendingDeleteTeamId = null;

        function showDeleteTeamModal(teamId) {
            pendingDeleteTeamId = teamId;
            var team = getTeam(teamId);
            if (team) {
                document.getElementById('deleteTeamDetail').textContent = '将删除「' + team.name + '」及其所有数据，不可恢复！';
            }
            document.getElementById('deleteTeamModal').classList.add('show');
        }

        function closeDeleteTeamModal() {
            document.getElementById('deleteTeamModal').classList.remove('show');
            pendingDeleteTeamId = null;
        }

        function confirmDeleteTeam() {
            if (!pendingDeleteTeamId) return;
            deleteTeam(pendingDeleteTeamId);
            closeDeleteTeamModal();
        }

        function deleteTeam(teamId) {
            var data = getAppData();
            var team = getTeam(teamId);
            if (!team) { showToast('⚠️ 团队不存在'); return; }

            var newTeams = [];
            for (var i = 0; i < data.teams.length; i++) {
                if (data.teams[i].id !== teamId) {
                    newTeams.push(data.teams[i]);
                }
            }
            data.teams = newTeams;
            delete data.fillData[teamId];
            delete data.versions[teamId];

            if (data.currentTeamId === teamId) {
                data.currentTeamId = data.teams.length > 0 ? data.teams[0].id : null;
            }

            saveAppData(data);
            renderAll();
            document.getElementById('qrcode').innerHTML = '';
            document.getElementById('shareLink').value = '';
            showToast('✅ 已删除');
        }

        // ============================================================
        //  成员管理 - 核心修复
        // ============================================================
        function renderMembers() {
            console.log('📋 renderMembers 被调用');
            var data = getAppData();
            var team = getCurrentTeam();
            var members = team && team.members ? team.members : [];
            var container = document.getElementById('memberList');
            if (!container) {
                console.error('❌ memberList 元素未找到');
                return;
            }

            var countEl = document.getElementById('memberCount');
            if (countEl) countEl.textContent = members.length;

            var male = 0,
                female = 0;
            for (var i = 0; i < members.length; i++) {
                if (members[i].gender === 'male') male++;
                else female++;
            }
            var statsEl = document.getElementById('genderStats');
            if (statsEl) statsEl.textContent = '👨 ' + male + ' · 👩 ' + female;

            if (members.length === 0) {
                container.innerHTML = '<div class="empty">还没有成员</div>';
                return;
            }

            var html = '';
            for (var i = 0; i < members.length; i++) {
                var m = members[i];
                var genderClass = m.gender === 'male' ? 'gender-m' : 'gender-f';
                var genderIcon = m.gender === 'male' ? '♂' : '♀';
                html += '<span class="member-tag">' +
                    m.name +
                    '<span class="gender-badge ' + genderClass + '">' + genderIcon + '</span>' +
                    '<button class="remove-btn" onclick="removeMember(\'' + m.name + '\')">×</button>' +
                    '</span>';
            }
            container.innerHTML = html;
            console.log('✅ 成员列表已更新，共 ' + members.length + ' 人');
        }

        function addMember() {
            console.log('=== addMember 被调用 ===');

            var nameInput = document.getElementById('memberName');
            var genderSelect = document.getElementById('memberGender');

            if (!nameInput || !genderSelect) {
                showToast('⚠️ 页面元素未加载');
                return;
            }

            var name = nameInput.value.trim();
            var gender = genderSelect.value;

            if (!name) {
                showToast('⚠️ 请输入姓名');
                nameInput.focus();
                return;
            }

            var team = getCurrentTeam();
            if (!team) {
                showToast('⚠️ 请先创建团队');
                return;
            }

            var members = team.members || [];
            for (var i = 0; i < members.length; i++) {
                if (members[i].name === name) {
                    showToast('⚠️ 该成员已存在');
                    nameInput.value = '';
                    nameInput.focus();
                    return;
                }
            }

            // 添加成员到团队
            members.push({ name: name, gender: gender });

            // 直接更新团队数据
            var data = getAppData();
            for (var i = 0; i < data.teams.length; i++) {
                if (data.teams[i].id === team.id) {
                    data.teams[i].members = members;
                    break;
                }
            }
            data.fillData[team.id] = { steps: [], currentCourt: [], usedPlayers: [], completed: false };

            // 保存到 localStorage
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));

            nameInput.value = '';
            nameInput.focus();

            // 强制刷新所有视图
            renderTeams();
            renderMembers();
            renderFillPage();
            renderVersions();

            showToast('✅ 已添加 ' + name);
            console.log('添加成功，当前成员数:', members.length);
        }

        function removeMember(name) {
            var team = getCurrentTeam();
            if (!team) return;

            var members = team.members || [];
            var index = -1;
            for (var i = 0; i < members.length; i++) {
                if (members[i].name === name) { index = i; break; }
            }
            if (index === -1) return;

            if (!confirm('移除「' + name + '」？')) return;
            members.splice(index, 1);

            var data = getAppData();
            for (var i = 0; i < data.teams.length; i++) {
                if (data.teams[i].id === team.id) {
                    data.teams[i].members = members;
                    break;
                }
            }
            data.fillData[team.id] = { steps: [], currentCourt: [], usedPlayers: [], completed: false };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));

            renderAll();
            showToast('已移除 ' + name);
        }

        function clearTeamMembers() {
            var team = getCurrentTeam();
            if (!team) return;
            var members = team.members || [];
            if (members.length === 0) { showToast('暂无成员'); return; }
            if (!confirm('清空所有成员？')) return;

            team.members = [];
            var data = getAppData();
            for (var i = 0; i < data.teams.length; i++) {
                if (data.teams[i].id === team.id) {
                    data.teams[i].members = [];
                    break;
                }
            }
            data.fillData[team.id] = { steps: [], currentCourt: [], usedPlayers: [], completed: false };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));

            renderAll();
            showToast('已清空');
        }

        function loadExampleMembers() {
            var team = getCurrentTeam();
            if (!team) return;
            var members = team.members || [];
            if (members.length > 0) {
                if (!confirm('覆盖当前成员？')) return;
            }

            team.members = [
                { name: '张伟', gender: 'male' },
                { name: '李娜', gender: 'female' },
                { name: '王强', gender: 'male' },
                { name: '刘洋', gender: 'female' },
                { name: '陈明', gender: 'male' },
                { name: '赵雪', gender: 'female' },
                { name: '孙浩', gender: 'male' },
                { name: '周婷', gender: 'female' }
            ];

            var data = getAppData();
            for (var i = 0; i < data.teams.length; i++) {
                if (data.teams[i].id === team.id) {
                    data.teams[i].members = team.members;
                    break;
                }
            }
            data.fillData[team.id] = { steps: [], currentCourt: [], usedPlayers: [], completed: false };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));

            renderAll();
            showToast('✅ 已加载示例');
        }

        // ============================================================
        //  排阵填报（简化版）
        // ============================================================
        var selectedReplaceGender = null;
        var selectedFillPlayers = [];

        function renderFillPage() {
            var container = document.getElementById('fillContainer');
            if (!container) return;

            var team = getCurrentTeam();
            if (!team || !team.members || team.members.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="icon">📝</div><p>请先添加成员</p></div>';
                return;
            }

            var fillData = getFillData(team.id);
            if (fillData && fillData.completed) {
                container.innerHTML = renderCompletedView(team, fillData);
                return;
            }

            var usedPlayers = fillData ? fillData.usedPlayers || [] : [];
            var allMembers = team.members;
            var allUsed = true;
            for (var i = 0; i < allMembers.length; i++) {
                if (usedPlayers.indexOf(allMembers[i].name) === -1) { allUsed = false; break; }
            }

            if (allUsed && fillData && fillData.steps && fillData.steps.length > 0) {
                fillData.completed = true;
                saveFillData(team.id, fillData);
                container.innerHTML = renderCompletedView(team, fillData);
                return;
            }

            container.innerHTML = renderFillForm(team, fillData);
        }

        function renderFillForm(team, fillData) {
            var steps = fillData ? fillData.steps || [] : [];
            var currentCourt = fillData ? fillData.currentCourt || [] : [];
            var usedPlayers = fillData ? fillData.usedPlayers || [] : [];
            var stepNum = steps.length + 1;
            var isFirstStep = steps.length === 0;

            var availablePlayers = [];
            for (var i = 0; i < team.members.length; i++) {
                if (usedPlayers.indexOf(team.members[i].name) === -1) {
                    availablePlayers.push(team.members[i]);
                }
            }

            var html = '';

            var totalSteps = team.members.length - 1;
            if (totalSteps > 0) {
                html += '<div class="step-indicator">';
                for (var i = 1; i <= totalSteps; i++) {
                    var cls = 'step-dot';
                    if (i < stepNum) cls += ' done';
                    if (i === stepNum) cls += ' active';
                    html += '<span class="' + cls + '">' + i + '</span>';
                }
                html += '</div>';
            }

            html += '<div class="lineup-step-card" style="border-color:#48bb78;">';
            html += '<div class="step-header">';
            html += '<span class="step-number">📍 第 ' + stepNum + ' 步</span>';
            html += '<span class="step-action start">' + (isFirstStep ? '🌟 首发' : '🔄 换人') + '</span>';
            html += '</div>';

            html += '<div style="margin-bottom:8px;font-weight:600;color:#2d3748;">当前场上：</div>';
            html += '<div class="court-slots">';
            var courtMale = null,
                courtFemale = null;
            for (var i = 0; i < currentCourt.length; i++) {
                if (currentCourt[i].gender === 'male') courtMale = currentCourt[i];
                else courtFemale = currentCourt[i];
            }
            html += '<div class="court-slot ' + (courtMale ? 'filled' : '') + '">';
            html += '<div class="slot-label">♂ 男</div>';
            html += '<div class="slot-name">' + (courtMale ? courtMale.name : '—') + '</div>';
            html += '</div>';
            html += '<div class="court-slot ' + (courtFemale ? 'filled' : '') + '">';
            html += '<div class="slot-label">♀ 女</div>';
            html += '<div class="slot-name">' + (courtFemale ? courtFemale.name : '—') + '</div>';
            html += '</div>';
            html += '</div>';

            if (!isFirstStep) {
                var lastStep = steps[steps.length - 1];
                html += '<div class="sub-info">⬇ ' + (lastStep.substitutedOut || '') + ' 下场 → ⬆ ' + (lastStep
                    .substitutedIn || '') + ' 上场</div>';
            }

            html += '</div>';

            if (availablePlayers.length > 0) {
                if (isFirstStep) {
                    html += '<div style="margin-top:12px;font-weight:600;color:#2d3748;">请选择首发（1男 + 1女）：</div>';
                    html += '<div class="member-select-grid" id="fillMemberGrid">';
                    for (var i = 0; i < availablePlayers.length; i++) {
                        var p = availablePlayers[i];
                        var icon = p.gender === 'male' ? '♂' : '♀';
                        html += '<span class="member-option" onclick="selectFillPlayer(\'' + p.name + '\', \'' + p
                            .gender + '\')" data-name="' + p.name + '">' + p.name + ' ' + icon + '</span>';
                    }
                    html += '</div>';
                    html += '<div class="mt-12">';
                    html += '<button class="btn btn-success" onclick="confirmFillStep()" id="confirmFillBtn" disabled>';
                    html += '✅ 确认首发';
                    html += '</button>';
                    html += ' <span class="text-muted text-sm" id="fillSelectionStatus">请选择 1男 + 1女</span>';
                    html += '</div>';
                } else {
                    var hasMaleOnCourt = false;
                    var hasFemaleOnCourt = false;
                    for (var i = 0; i < currentCourt.length; i++) {
                        if (currentCourt[i].gender === 'male') hasMaleOnCourt = true;
                        else hasFemaleOnCourt = true;
                    }

                    var hasAvailableMale = false;
                    var hasAvailableFemale = false;
                    for (var i = 0; i < availablePlayers.length; i++) {
                        if (availablePlayers[i].gender === 'male') hasAvailableMale = true;
                        else hasAvailableFemale = true;
                    }

                    html += '<div style="margin-top:12px;font-weight:600;color:#2d3748;">第一步：选择换下的性别</div>';
                    html += '<div class="gender-select-group">';
                    html += '<button class="gender-btn" id="genderBtnMale" onclick="selectReplaceGender(\'male\')" ' +
                        (hasMaleOnCourt && hasAvailableMale ? '' : 'disabled') + '>♂ 换男</button>';
                    html += '<button class="gender-btn" id="genderBtnFemale" onclick="selectReplaceGender(\'female\')" ' +
                        (hasFemaleOnCourt && hasAvailableFemale ? '' : 'disabled') + '>♀ 换女</button>';
                    html += '</div>';

                    html += '<div class="text-muted text-sm" id="selectedGenderDisplay" style="margin-bottom:8px;">';
                    if (selectedReplaceGender === 'male') html += '已选择：换下 ♂ 男队员';
                    else if (selectedReplaceGender === 'female') html += '已选择：换下 ♀ 女队员';
                    else html += '请先选择换下的性别';
                    html += '</div>';

                    html += '<div style="margin-top:8px;font-weight:600;color:#2d3748;">第二步：选择上场的队员</div>';
                    html += '<div class="member-select-grid" id="fillMemberGrid">';

                    var filtered = [];
                    if (selectedReplaceGender) {
                        for (var i = 0; i < availablePlayers.length; i++) {
                            if (availablePlayers[i].gender === selectedReplaceGender) {
                                filtered.push(availablePlayers[i]);
                            }
                        }
                    }

                    if (filtered.length === 0 && selectedReplaceGender) {
                        html += '<span class="text-muted text-sm">没有符合条件的队员</span>';
                    } else if (!selectedReplaceGender) {
                        html += '<span class="text-muted text-sm">请先选择换下的性别</span>';
                    } else {
                        for (var i = 0; i < filtered.length; i++) {
                            var p = filtered[i];
                            var icon = p.gender === 'male' ? '♂' : '♀';
                            html += '<span class="member-option" onclick="selectFillPlayer(\'' + p.name + '\', \'' + p
                                .gender + '\')" data-name="' + p.name + '">' + p.name + ' ' + icon + '</span>';
                        }
                    }
                    html += '</div>';

                    html += '<div class="mt-12">';
                    html += '<button class="btn btn-success" onclick="confirmFillStep()" id="confirmFillBtn" disabled>';
                    html += '✅ 确认换人';
                    html += '</button>';
                    html += ' <span class="text-muted text-sm" id="fillSelectionStatus">请选择要上场的队员</span>';
                    html += '</div>';
                }
            } else {
                html += '<div class="empty-state"><div class="icon">🎉</div><p>所有队员都已上场！排阵完成</p></div>';
                if (fillData) {
                    fillData.completed = true;
                    saveFillData(team.id, fillData);
                }
                setTimeout(function() { renderFillPage(); }, 500);
            }

            return html;
        }

        function selectReplaceGender(gender) {
            selectedReplaceGender = gender;
            selectedFillPlayers = [];

            var btnMale = document.getElementById('genderBtnMale');
            var btnFemale = document.getElementById('genderBtnFemale');
            if (btnMale) btnMale.className = 'gender-btn' + (gender === 'male' ? ' active-male' : '');
            if (btnFemale) btnFemale.className = 'gender-btn' + (gender === 'female' ? ' active-female' : '');

            var display = document.getElementById('selectedGenderDisplay');
            if (display) {
                if (gender === 'male') display.textContent = '已选择：换下 ♂ 男队员';
                else display.textContent = '已选择：换下 ♀ 女队员';
            }

            var team = getCurrentTeam();
            if (team) {
                var fillData = getFillData(team.id);
                var grid = document.getElementById('fillMemberGrid');
                if (grid) {
                    var availablePlayers = [];
                    var usedPlayers = fillData ? fillData.usedPlayers || [] : [];
                    for (var i = 0; i < team.members.length; i++) {
                        if (usedPlayers.indexOf(team.members[i].name) === -1) {
                            availablePlayers.push(team.members[i]);
                        }
                    }
                    var filtered = [];
                    for (var i = 0; i < availablePlayers.length; i++) {
                        if (availablePlayers[i].gender === gender) {
                            filtered.push(availablePlayers[i]);
                        }
                    }
                    var html = '';
                    if (filtered.length === 0) {
                        html = '<span class="text-muted text-sm">没有符合条件的队员</span>';
                    } else {
                        for (var i = 0; i < filtered.length; i++) {
                            var p = filtered[i];
                            var icon = p.gender === 'male' ? '♂' : '♀';
                            html += '<span class="member-option" onclick="selectFillPlayer(\'' + p.name + '\', \'' + p
                                .gender + '\')" data-name="' + p.name + '">' + p.name + ' ' + icon + '</span>';
                        }
                    }
                    grid.innerHTML = html;
                }
            }

            var status = document.getElementById('fillSelectionStatus');
            if (status) status.textContent = '请选择要上场的队员';
            var btn = document.getElementById('confirmFillBtn');
            if (btn) btn.disabled = true;
        }

        function selectFillPlayer(name, gender) {
            var team = getCurrentTeam();
            if (!team) return;

            var fillData = getFillData(team.id);
            var isFirstStep = fillData ? fillData.steps.length === 0 : true;

            if (isFirstStep) {
                var existing = selectedFillPlayers.find(function(p) { return p.name === name; });
                if (existing) {
                    selectedFillPlayers = selectedFillPlayers.filter(function(p) { return p.name !== name; });
                } else {
                    var sameGender = selectedFillPlayers.find(function(p) { return p.gender === gender; });
                    if (sameGender) {
                        selectedFillPlayers = selectedFillPlayers.filter(function(p) { return p.gender !== gender; });
                    }
                    selectedFillPlayers.push({ name: name, gender: gender });
                }

                var grid = document.getElementById('fillMemberGrid');
                if (grid) {
                    var options = grid.querySelectorAll('.member-option');
                    for (var i = 0; i < options.length; i++) {
                        var opt = options[i];
                        var optName = opt.getAttribute('data-name');
                        var isSelected = selectedFillPlayers.some(function(p) { return p.name === optName; });
                        opt.classList.toggle('selected', isSelected);
                    }
                }

                var btn = document.getElementById('confirmFillBtn');
                var status = document.getElementById('fillSelectionStatus');
                if (btn && status) {
                    var hasMale = selectedFillPlayers.some(function(p) { return p.gender === 'male'; });
                    var hasFemale = selectedFillPlayers.some(function(p) { return p.gender === 'female'; });
                    if (hasMale && hasFemale) {
                        btn.disabled = false;
                        status.textContent = '✅ 已选 1男 + 1女';
                    } else {
                        btn.disabled = true;
                        status.textContent = '请选择 1男 + 1女';
                    }
                }
            } else {
                if (selectedReplaceGender && gender !== selectedReplaceGender) {
                    showToast('⚠️ 请选择 ' + (selectedReplaceGender === 'male' ? '男' : '女') + ' 队员');
                    return;
                }
                var existing = selectedFillPlayers.find(function(p) { return p.name === name; });
                if (existing) {
                    selectedFillPlayers = [];
                } else {
                    selectedFillPlayers = [{ name: name, gender: gender }];
                }

                var grid = document.getElementById('fillMemberGrid');
                if (grid) {
                    var options = grid.querySelectorAll('.member-option');
                    for (var i = 0; i < options.length; i++) {
                        var opt = options[i];
                        var optName = opt.getAttribute('data-name');
                        var isSelected = selectedFillPlayers.some(function(p) { return p.name === optName; });
                        opt.classList.toggle('selected', isSelected);
                    }
                }

                var btn = document.getElementById('confirmFillBtn');
                var status = document.getElementById('fillSelectionStatus');
                if (btn && status) {
                    if (selectedFillPlayers.length === 1) {
                        btn.disabled = false;
                        status.textContent = '✅ 已选 ' + selectedFillPlayers[0].name;
                    } else {
                        btn.disabled = true;
                        status.textContent = '请选择要上场的队员';
                    }
                }
            }
        }

        function confirmFillStep() {
            var team = getCurrentTeam();
            if (!team) { showToast('⚠️ 未找到团队'); return; }

            var fillData = getFillData(team.id);
            if (!fillData) {
                fillData = { steps: [], currentCourt: [], usedPlayers: [], completed: false };
            }

            var isFirstStep = fillData.steps.length === 0;

            if (selectedFillPlayers.length === 0) {
                showToast('⚠️ 请先选择队员');
                return;
            }

            var currentCourt = fillData.currentCourt || [];
            var usedPlayers = fillData.usedPlayers || [];
            var steps = fillData.steps || [];
            var stepNum = steps.length + 1;

            var newCourt = [];
            var subOut = null;
            var subIn = null;

            if (isFirstStep) {
                var male = selectedFillPlayers.find(function(p) { return p.gender === 'male'; });
                var female = selectedFillPlayers.find(function(p) { return p.gender === 'female'; });
                if (!male || !female) { showToast('⚠️ 请选择 1男 + 1女'); return; }
                newCourt = [male, female];
                usedPlayers = [male.name, female.name];
                steps.push({
                    step: stepNum,
                    action: '首发',
                    onCourt: [{ name: male.name, gender: male.gender }, { name: female.name, gender: female.gender }],
                    substitutedOut: null,
                    substitutedIn: null
                });
            } else {
                var selected = selectedFillPlayers[0];
                var toReplace = null;
                for (var i = 0; i < currentCourt.length; i++) {
                    if (currentCourt[i].gender === selected.gender) {
                        toReplace = currentCourt[i];
                        break;
                    }
                }
                if (!toReplace) {
                    showToast('⚠️ 场上没有同性别队员可换');
                    return;
                }

                subOut = toReplace;
                subIn = selected;

                newCourt = [];
                for (var i = 0; i < currentCourt.length; i++) {
                    if (currentCourt[i].name !== toReplace.name) {
                        newCourt.push(currentCourt[i]);
                    }
                }
                newCourt.push(selected);
                usedPlayers.push(selected.name);

                steps.push({
                    step: stepNum,
                    action: '换人',
                    onCourt: newCourt.map(function(p) { return { name: p.name, gender: p.gender }; }),
                    substitutedOut: subOut.name,
                    substitutedIn: subIn.name
                });
            }

            fillData.currentCourt = newCourt;
            fillData.usedPlayers = usedPlayers;
            fillData.steps = steps;

            var allMembers = team.members;
            var allUsed = true;
            for (var i = 0; i < allMembers.length; i++) {
                if (usedPlayers.indexOf(allMembers[i].name) === -1) { allUsed = false; break; }
            }
            if (allUsed && steps.length > 0) {
                fillData.completed = true;
            }

            saveFillData(team.id, fillData);
            selectedFillPlayers = [];
            selectedReplaceGender = null;

            renderFillPage();
            renderVersions();
            showToast('✅ 第 ' + stepNum + ' 步确认完成');
        }

        function renderCompletedView(team, fillData) {
            var html = '<div class="empty-state" style="padding:20px;">';
            html += '<div class="icon">🎉</div>';
            html += '<h3 style="color:#276749;">排阵已完成！</h3>';
            html += '<p class="text-muted">所有 ' + team.members.length + ' 名队员都已上场</p>';
            html += '</div>';

            html += '<div style="margin-top:12px;">';
            html += '<h3>📋 完整出场顺序</h3>';
            for (var i = 0; i < fillData.steps.length; i++) {
                var s = fillData.steps[i];
                html += '<div class="lineup-step-card">';
                html += '<div class="step-header">';
                html += '<span class="step-number">第 ' + s.step + ' 步</span>';
                html += '<span class="step-action ' + (s.action === '首发' ? 'start' : '') + '">' +
                    (s.action === '首发' ? '🌟 首发' : '🔄 换人') + '</span>';
                html += '</div>';
                html += '<div class="court-players">';
                for (var j = 0; j < s.onCourt.length; j++) {
                    var p = s.onCourt[j];
                    html += '<span class="court-player ' + p.gender + '">' + p.name + ' ' + (p.gender === 'male' ? '♂' :
                        '♀') + '</span>';
                }
                html += '</div>';
                if (s.substitutedOut) {
                    html += '<div class="sub-info">⬇ ' + s.substitutedOut + ' 下场 → ⬆ ' + s.substitutedIn + ' 上场</div>';
                }
                html += '</div>';
            }
            html += '</div>';

            html += '<div class="mt-12 flex">';
            html += '<button class="btn btn-success btn-sm" onclick="showSaveVersionModal()">💾 保存为版本</button>';
            html += '<button class="btn btn-danger btn-sm" onclick="resetFillData()">🔄 重置重新填报</button>';
            html += '</div>';

            return html;
        }

        function resetFillData() {
            if (!confirm('确认重置当前团队的填报数据？')) return;
            var team = getCurrentTeam();
            if (!team) return;

            var fillData = { steps: [], currentCourt: [], usedPlayers: [], completed: false };
            saveFillData(team.id, fillData);
            selectedFillPlayers = [];
            selectedReplaceGender = null;

            renderFillPage();
            renderVersions();
            showToast('已重置');
        }

        // ============================================================
        //  版本管理
        // ============================================================
        function showSaveVersionModal() {
            var team = getCurrentTeam();
            if (!team) { showToast('请选择团队'); return; }

            var fillData = getFillData(team.id);
            if (!fillData || !fillData.steps || fillData.steps.length === 0) {
                showToast('⚠️ 当前没有排阵数据可保存');
                return;
            }

            document.getElementById('versionNoteInput').value = '';
            document.getElementById('saveVersionModal').classList.add('show');
            setTimeout(function() { document.getElementById('versionNoteInput').focus(); }, 100);
        }

        function closeSaveVersionModal() {
            document.getElementById('saveVersionModal').classList.remove('show');
        }

        function confirmSaveVersion() {
            var team = getCurrentTeam();
            if (!team) { showToast('请选择团队'); return; }

            var fillData = getFillData(team.id);
            if (!fillData || !fillData.steps || fillData.steps.length === 0) {
                showToast('⚠️ 没有排阵数据可保存');
                closeSaveVersionModal();
                return;
            }

            var note = document.getElementById('versionNoteInput').value.trim();
            if (!note) {
                var versions = getVersions(team.id);
                note = '第 ' + (versions.length + 1) + ' 版';
            }

            addVersion(team.id, note, fillData);
            closeSaveVersionModal();
            renderVersions();
            showToast('✅ 已保存版本: ' + note);
        }

        function addVersion(teamId, note, fillData) {
            var versions = getVersions(teamId);
            var version = {
                id: 'v_' + Date.now(),
                note: note,
                steps: fillData.steps || [],
                usedPlayers: fillData.usedPlayers || [],
                currentCourt: fillData.currentCourt || [],
                completed: fillData.completed || false,
                createdAt: new Date().toISOString()
            };
            versions.push(version);
            saveVersions(teamId, versions);
            return version;
        }

        function renderVersions() {
            var container = document.getElementById('versionContainer');
            if (!container) return;

            var team = getCurrentTeam();
            if (!team) {
                container.innerHTML = '<div class="empty-state"><div class="icon">📚</div><p>请选择团队</p></div>';
                return;
            }

            var versions = getVersions(team.id);
            document.getElementById('versionCount').textContent = '共 ' + versions.length + ' 个版本';

            if (versions.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="icon">📚</div><p>暂无历史版本</p></div>';
                return;
            }

            var html = '';
            var sorted = versions.slice().reverse();
            for (var i = 0; i < sorted.length; i++) {
                var v = sorted[i];
                var date = new Date(v.createdAt);
                var dateStr = date.toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit',
                    minute: '2-digit' });

                html += '<div class="version-item">';
                html += '<div class="version-info">';
                html += '<span class="version-time">📌 ' + v.note + '</span>';
                html += '<span class="version-note">' + dateStr + ' · ' + v.steps.length + ' 步 · ' + v.usedPlayers
                    .length + ' 人上场</span>';
                html += '</div>';
                html += '<div class="version-actions">';
                html += '<button class="btn btn-sm btn-primary" onclick="viewVersion(\'' + v.id + '\')">👁 查看</button>';
                html += '<button class="btn btn-sm btn-danger" onclick="deleteVersionConfirm(\'' + v.id + '\')">🗑</button>';
                html += '</div>';
                html += '</div>';
            }

            container.innerHTML = html;
        }

        var viewingVersionId = null;

        function viewVersion(versionId) {
            var team = getCurrentTeam();
            if (!team) return;

            var version = getVersion(team.id, versionId);
            if (!version) { showToast('版本不存在'); return; }

            viewingVersionId = versionId;
            document.getElementById('viewVersionTitle').textContent = '📋 ' + version.note;

            var html = '<div style="margin-bottom:12px;">';
            html += '<p class="text-muted text-sm">保存于：' + new Date(version.createdAt).toLocaleString() + '</p>';
            html += '<p class="text-muted text-sm">' + version.steps.length + ' 步 · ' + version.usedPlayers.length +
                ' 人已上场</p>';
            html += '</div>';

            for (var i = 0; i < version.steps.length; i++) {
                var s = version.steps[i];
                var courtHtml = '';
                for (var j = 0; j < s.onCourt.length; j++) {
                    var p = s.onCourt[j];
                    courtHtml += '<span style="display:inline-block;padding:4px 14px;border-radius:12px;border:2px solid #4299e1;font-weight:600;font-size:13px;margin:2px;' +
                        (p.gender === 'male' ? 'background:#ebf8ff;border-color:#4299e1;' :
                            'background:#fff5f7;border-color:#ed64a6;') + '">' +
                        p.name + ' ' + (p.gender === 'male' ? '♂' : '♀') + '</span>';
                }
                var actionText = s.action === '首发' ? '🌟 首发' : '⬇ ' + (s.substitutedOut || '') + ' → ⬆ ' + (s
                    .substitutedIn || '');
                html += '<div style="padding:10px 14px;margin-bottom:6px;background:#f7fafc;border-radius:10px;border-left:4px solid #4299e1;">';
                html += '<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;">';
                html += '<span style="font-weight:700;font-size:14px;color:#2d3748;">第 ' + s.step + ' 步</span>';
                html += '<span style="font-size:12px;color:#718096;">' + actionText + '</span>';
                html += '</div>';
                html += '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;">' + courtHtml + '</div>';
                html += '</div>';
            }

            document.getElementById('viewVersionContent').innerHTML = html;
            document.getElementById('viewVersionModal').classList.add('show');
        }

        function closeViewVersionModal() {
            document.getElementById('viewVersionModal').classList.remove('show');
            viewingVersionId = null;
        }

        function restoreVersion() {
            if (!viewingVersionId) return;
            var team = getCurrentTeam();
            if (!team) return;

            var version = getVersion(team.id, viewingVersionId);
            if (!version) { showToast('版本不存在'); return; }

            if (!confirm('确认恢复此版本？将覆盖当前排阵数据。')) return;

            var fillData = {
                steps: version.steps.slice(),
                currentCourt: version.currentCourt.slice(),
                usedPlayers: version.usedPlayers.slice(),
                completed: version.completed || false
            };

            saveFillData(team.id, fillData);
            selectedFillPlayers = [];
            selectedReplaceGender = null;

            closeViewVersionModal();
            renderFillPage();
            renderVersions();
            showToast('✅ 已恢复版本: ' + version.note);
        }

        function deleteVersionConfirm(versionId) {
            if (!confirm('确定删除此版本？')) return;
            var team = getCurrentTeam();
            if (!team) return;
            deleteVersion(team.id, versionId);
            showToast('已删除');
        }

        function deleteVersion(teamId, versionId) {
            var versions = getVersions(teamId);
            var filtered = [];
            for (var i = 0; i < versions.length; i++) {
                if (versions[i].id !== versionId) {
                    filtered.push(versions[i]);
                }
            }
            saveVersions(teamId, filtered);
            renderVersions();
        }

        function getVersion(teamId, versionId) {
            var versions = getVersions(teamId);
            for (var i = 0; i < versions.length; i++) {
                if (versions[i].id === versionId) {
                    return versions[i];
                }
            }
            return null;
        }

        function clearAllVersions() {
            var team = getCurrentTeam();
            if (!team) return;
            var versions = getVersions(team.id);
            if (versions.length === 0) { showToast('暂无版本'); return; }
            if (!confirm('确定清空所有历史版本？')) return;
            saveVersions(team.id, []);
            renderVersions();
            showToast('已清空所有版本');
        }

        // ============================================================
        //  二维码
        // ============================================================
        function generateShareQR() {
            var team = getCurrentTeam();
            if (!team) { showToast('请选择团队'); return; }

            var fillData = getFillData(team.id);
            var shareData = {
                teamId: team.id,
                teamName: team.name,
                members: team.members || [],
                fillData: fillData || { steps: [], currentCourt: [], usedPlayers: [], completed: false },
                mode: 'fill'
            };

            var encoded = encodeURIComponent(JSON.stringify(shareData));
            var url = window.location.origin + window.location.pathname + '?fill=' + encoded;

            document.getElementById('shareLink').value = url;
            var container = document.getElementById('qrcode');
            if (!container) return;
            container.innerHTML = '';
            try {
                new QRCode(container, {
                    text: url,
                    width: 200,
                    height: 200,
                    colorDark: '#1a202c',
                    colorLight: '#ffffff',
                    correctLevel: QRCode.CorrectLevel.H
                });
                showToast('✅ 二维码已生成');
            } catch (e) {
                showToast('⚠️ 生成失败，请检查网络');
                console.error(e);
            }
        }

        function copyShareLink() {
            var input = document.getElementById('shareLink');
            if (!input || !input.value) { showToast('请先生成二维码'); return; }
            input.select();
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(input.value).then(function() { showToast('✅ 已复制'); })['catch'](function() {
                    document.execCommand('copy');
                    showToast('✅ 已复制'); });
            } else {
                document.execCommand('copy');
                showToast('✅ 已复制');
            }
        }

        // ============================================================
        //  导入导出
        // ============================================================
        function exportAllData() {
            var data = getAppData();
            var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            var link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = '排兵布阵_数据_' + new Date().toISOString().slice(0, 10) + '.json';
            link.click();
            showToast('✅ 全部数据已导出');
