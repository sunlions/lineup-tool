<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏸 排兵布阵 - 团队版</title>
    <!-- 引入云开发 SDK -->
    <script src="https://res.wx.qq.com/open/js/cloudbase/1.1.0/cloud.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js">
    </script>
    <style>
        /* ===== 样式和之前一样，为了节省篇幅此处省略，但实际部署时你需要保留全部样式 ===== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #f0f4f8;
            padding: 16px;
            min-height: 100vh;
        }
        .app {
            max-width: 1100px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            margin-bottom: 20px;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .flex {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        h1 {
            font-size: 26px;
            color: #1a202c;
        }
        h2 {
            font-size: 18px;
            color: #2d3748;
            margin-bottom: 12px;
        }
        h3 {
            font-size: 15px;
            color: #4a5568;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #718096;
            font-size: 14px;
        }
        .text-muted {
            color: #718096;
            font-size: 14px;
        }
        .text-sm {
            font-size: 13px;
        }
        .hidden {
            display: none !important;
        }
        .mt-12 {
            margin-top: 12px;
        }
        .mb-12 {
            margin-bottom: 12px;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 768px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }
        }

        .form-group {
            margin-bottom: 14px;
        }
        label {
            display: block;
            font-weight: 600;
            color: #2d3748;
            font-size: 14px;
            margin-bottom: 4px;
        }
        input,
        select {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 15px;
            background: white;
        }
        input:focus,
        select:focus {
            border-color: #4299e1;
            outline: none;
        }

        .btn {
            padding: 10px 22px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn:active {
            transform: scale(0.97);
        }
        .btn-primary {
            background: #4299e1;
            color: white;
        }
        .btn-primary:hover {
            background: #3182ce;
        }
        .btn-success {
            background: #48bb78;
            color: white;
        }
        .btn-success:hover {
            background: #38a169;
        }
        .btn-danger {
            background: #fc8181;
            color: white;
        }
        .btn-danger:hover {
            background: #f56565;
        }
        .btn-outline {
            background: transparent;
            border: 2px solid #e2e8f0;
            color: #4a5568;
        }
        .btn-outline:hover {
            background: #f7fafc;
        }
        .btn-sm {
            padding: 6px 14px;
            font-size: 13px;
        }
        .btn-block {
            width: 100%;
            justify-content: center;
        }
        .btn-purple {
            background: #9f7aea;
            color: white;
        }
        .btn-purple:hover {
            background: #805ad5;
        }

        .team-selector {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .team-tab {
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            background: #edf2f7;
            font-weight: 500;
            border: 2px solid transparent;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .team-tab:hover {
            background: #e2e8f0;
        }
        .team-tab.active {
            background: #4299e1;
            color: white;
            border-color: #4299e1;
        }
        .team-tab .count {
            font-size: 12px;
            opacity: 0.7;
            margin-left: 4px;
        }
        .team-tab .delete-team-btn {
            background: none;
            border: none;
            color: #a0aec0;
            cursor: pointer;
            font-size: 16px;
            padding: 0 2px;
        }
        .team-tab .delete-team-btn:hover {
            color: #e53e3e;
        }

        .member-tag {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #edf2f7;
            padding: 6px 14px 6px 18px;
            border-radius: 20px;
            margin: 4px 6px 4px 0;
            font-size: 14px;
        }
        .member-tag .gender-badge {
            font-size: 11px;
            padding: 1px 8px;
            border-radius: 12px;
            font-weight: 700;
        }
        .gender-m {
            background: #bee3f8;
            color: #2b6cb0;
        }
        .gender-f {
            background: #fbb6ce;
            color: #b83280;
        }
        .member-tag .remove-btn {
            cursor: pointer;
            color: #a0aec0;
            font-weight: 700;
            font-size: 18px;
            background: none;
            border: none;
            padding: 0 4px;
        }
        .member-tag .remove-btn:hover {
            color: #e53e3e;
        }

        .member-list {
            min-height: 60px;
            background: #f7fafc;
            border-radius: 12px;
            padding: 12px;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            gap: 4px;
        }
        .member-list .empty {
            width: 100%;
            text-align: center;
            color: #a0aec0;
            padding: 16px 0;
            font-size: 14px;
        }

        .tab-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .tab {
            padding: 8px 22px;
            border-radius: 20px;
            cursor: pointer;
            background: #edf2f7;
            font-weight: 500;
            border: none;
            font-size: 14px;
        }
        .tab.active {
            background: #4299e1;
            color: white;
        }
        .tab:hover:not(.active) {
            background: #e2e8f0;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #1a202c;
            color: white;
            padding: 12px 28px;
            border-radius: 12px;
            font-weight: 500;
            opacity: 0;
            transition: 0.3s;
            pointer-events: none;
            z-index: 999;
            font-size: 14px;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #a0aec0;
        }
        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-blue {
            background: #bee3f8;
            color: #2b6cb0;
        }
        .badge-green {
            background: #c6f6d5;
            color: #276749;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal-box {
            background: white;
            border-radius: 20px;
            padding: 32px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .lineup-step-card {
            background: #f7fafc;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            border-left: 4px solid #4299e1;
        }
        .lineup-step-card .step-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .lineup-step-card .step-number {
            font-weight: 700;
            font-size: 16px;
            color: #2d3748;
        }
        .lineup-step-card .step-action {
            font-size: 13px;
            padding: 2px 12px;
            border-radius: 12px;
            background: #ebf8ff;
            color: #2b6cb0;
        }
        .lineup-step-card .step-action.start {
            background: #c6f6d5;
            color: #276749;
        }
        .lineup-step-card .court-players {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        .lineup-step-card .court-player {
            background: white;
            padding: 6px 18px;
            border-radius: 12px;
            border: 2px solid #4299e1;
            font-weight: 600;
            font-size: 14px;
        }
        .lineup-step-card .court-player.male {
            border-color: #4299e1;
            background: #ebf8ff;
        }
        .lineup-step-card .court-player.female {
            border-color: #ed64a6;
            background: #fff5f7;
        }
        .lineup-step-card .sub-info {
            font-size: 13px;
            color: #e53e3e;
            margin-top: 6px;
        }

        .member-select-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 12px;
            background: #f7fafc;
            border-radius: 10px;
            min-height: 60px;
        }
        .member-select-grid .member-option {
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            background: white;
            border: 2px solid #e2e8f0;
            font-size: 14px;
            transition: 0.2s;
        }
        .member-select-grid .member-option:hover:not(.disabled) {
            border-color: #4299e1;
            background: #ebf8ff;
        }
        .member-select-grid .member-option.selected {
            border-color: #4299e1;
            background: #4299e1;
            color: white;
        }
        .member-select-grid .member-option.disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .court-slots {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            padding: 12px;
            background: #f7fafc;
            border-radius: 10px;
            margin-bottom: 12px;
        }
        .court-slot {
            background: white;
            border: 2px dashed #cbd5e0;
            border-radius: 12px;
            padding: 10px 24px;
            min-width: 100px;
            text-align: center;
            flex: 1;
        }
        .court-slot.filled {
            border-style: solid;
            border-color: #4299e1;
            background: #ebf8ff;
        }
        .court-slot .slot-label {
            font-size: 12px;
            color: #a0aec0;
        }
        .court-slot .slot-name {
            font-weight: 700;
            font-size: 18px;
            color: #2d3748;
        }

        .qr-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background: #f7fafc;
            border-radius: 16px;
        }
        #qrcode {
            background: white;
            padding: 12px;
            border-radius: 12px;
        }
        .share-link {
            margin-top: 12px;
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 450px;
        }
        .share-link input {
            flex: 1;
            background: white;
            font-size: 13px;
        }

        .fill-container .step-indicator {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 16px;
        }
        .fill-container .step-dot {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #edf2f7;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 13px;
            color: #a0aec0;
        }
        .fill-container .step-dot.active {
            background: #4299e1;
            color: white;
        }
        .fill-container .step-dot.done {
            background: #48bb78;
            color: white;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        .data-table th {
            background: #f7fafc;
            padding: 10px 12px;
            text-align: left;
            border-bottom: 2px solid #e2e8f0;
        }
        .data-table td {
            padding: 8px 12px;
            border-bottom: 1px solid #e2e8f0;
        }

        .gender-select-group {
            display: flex;
            gap: 12px;
            margin: 12px 0;
        }
        .gender-select-group .gender-btn {
            padding: 8px 24px;
            border-radius: 20px;
            border: 2px solid #e2e8f0;
            background: white;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            flex: 1;
        }
        .gender-select-group .gender-btn:hover {
            border-color: #4299e1;
        }
        .gender-select-group .gender-btn.active-male {
            border-color: #4299e1;
            background: #ebf8ff;
            color: #2b6cb0;
        }
        .gender-select-group .gender-btn.active-female {
            border-color: #ed64a6;
            background: #fff5f7;
            color: #b83280;
        }
        .gender-select-group .gender-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .data-update-banner {
            background: #ebf8ff;
            border: 1px solid #bee3f8;
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .data-update-banner .msg {
            color: #2b6cb0;
            font-size: 14px;
        }
        .data-update-banner .time {
            color: #718096;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="app" id="app">
        <div class="toast" id="toast"></div>

        <!-- Header -->
        <div class="card">
            <div class="flex-between">
                <div>
                    <h1>🏸 排兵布阵系统</h1>
                    <p class="subtitle" id="connectionStatus">☁️ 已连接到云端</p>
                </div>
                <div class="flex">
                    <button class="btn btn-success btn-sm" onclick="syncAllData()">☁️ 同步云端</button>
                    <button class="btn btn-purple btn-sm" onclick="exportAllData()">💾 导出</button>
                    <button class="btn btn-outline btn-sm" onclick="document.getElementById('importFile').click()">📥 导入</button>
                    <input type="file" id="importFile" accept=".json" style="display:none" onchange="handleImport(event)">
                </div>
            </div>
        </div>

        <!-- 团队切换 -->
        <div class="card">
            <div class="flex-between">
                <div class="team-selector" id="teamSelector"></div>
                <button class="btn btn-primary btn-sm" onclick="showAddTeamModal()">➕ 新建团队</button>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tab-bar">
            <button class="tab active" data-tab="members" onclick="switchTab('members')">👥 成员</button>
            <button class="tab" data-tab="fill" onclick="switchTab('fill')">📝 填报</button>
            <button class="tab" data-tab="data" onclick="switchTab('data')">📊 数据</button>
            <button class="tab" data-tab="share" onclick="switchTab('share')">📱 二维码</button>
        </div>

        <!-- ===== TAB 1: 成员管理 ===== -->
        <div class="card" id="tab-members">
            <div class="grid-2">
                <div>
                    <h2>➕ 添加成员</h2>
                    <p class="subtitle" style="margin-bottom:12px;">当前：<strong id="currentTeamName">-</strong></p>
                    <div class="form-group">
                        <label>👤 姓名</label>
                        <input type="text" id="memberName" placeholder="输入姓名" onkeydown="if(event.key==='Enter'){event.preventDefault();addMember();}">
                    </div>
                    <div class="form-group">
                        <label>⚧ 性别</label>
                        <select id="memberGender">
                            <option value="male">♂ 男</option>
                            <option value="female">♀ 女</option>
                        </select>
                    </div>
                    <button class="btn btn-primary btn-block" onclick="addMember()">➕ 添加</button>
                    <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;">
                        <button class="btn btn-sm btn-outline" onclick="loadExample()">📥 示例</button>
                        <button class="btn btn-sm btn-danger" onclick="clearTeamMembers()">🗑 清空</button>
                    </div>
                </div>
                <div>
                    <div class="flex-between mb-12">
                        <span style="font-weight:600;">成员 · <span id="memberCount">0</span> 人</span>
                        <span class="text-muted" id="genderStats">👨 0 · 👩 0</span>
                    </div>
                    <div class="member-list" id="memberList">
                        <div class="empty">还没有成员</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ===== TAB 2: 填报排阵 ===== -->
        <div class="card hidden" id="tab-fill">
            <div class="flex-between mb-12">
                <h2>📝 填报出场名单</h2>
                <div class="flex">
                    <span class="text-muted text-sm">当前：<strong id="fillTeamName">-</strong></span>
                    <button class="btn btn-danger btn-sm" onclick="resetFillData()">🔄 重置</button>
                </div>
            </div>
            <div id="fillContainer">
                <div class="empty-state"><div class="icon">📝</div><p>请先添加成员</p></div>
            </div>
        </div>

        <!-- ===== TAB 3: 数据导出 ===== -->
        <div class="card hidden" id="tab-data">
            <div class="flex-between mb-12">
                <h2>📊 所有团队填报数据</h2>
                <div class="flex">
                    <button class="btn btn-success btn-sm" onclick="exportAllFillDataCSV()">📥 汇总CSV</button>
                    <button class="btn btn-outline btn-sm" onclick="refreshDataDisplay()">🔄 刷新</button>
                </div>
            </div>
            <div id="dataContainer">
                <div class="empty-state"><div class="icon">📊</div><p>暂无数据，请先同步云端</p></div>
            </div>
        </div>

        <!-- ===== TAB 4: 二维码 ===== -->
        <div class="card hidden" id="tab-share">
            <p class="text-muted" style="margin-bottom:16px;">每个团队独立二维码，扫码填报</p>
            <div class="qr-box">
                <div id="qrcode"></div>
                <div class="share-link">
                    <input type="text" id="shareLink" readonly placeholder="生成后显示链接">
                    <button class="btn btn-primary" onclick="copyShareLink()">📋 复制</button>
                </div>
                <button class="btn btn-success" onclick="generateShareQR()">🔄 生成二维码</button>
            </div>
            <div class="mt-12" style="background:#ebf8ff;padding:14px 18px;border-radius:12px;border-left:4px solid #4299e1;">
                <p style="font-size:14px;color:#2b6cb0;">💡 每个团队二维码不同，扫码后只显示该团队的排阵</p>
            </div>
        </div>
    </div>

    <!-- ===== 新建团队弹窗 ===== -->
    <div class="modal-overlay" id="addTeamModal">
        <div class="modal-box">
            <h2>🏷️ 新建团队</h2>
            <p class="text-muted" style="margin-bottom:16px;">输入团队名称</p>
            <div class="form-group">
                <label>名称</label>
                <input type="text" id="newTeamNameInput" placeholder="例如：红队" onkeydown="if(event.key==='Enter'){event.preventDefault();confirmAddTeam();}">
            </div>
            <div style="display:flex;gap:10px;margin-top:8px;">
                <button class="btn btn-primary" style="flex:1;" onclick="confirmAddTeam()">✅ 创建</button>
                <button class="btn btn-outline" style="flex:1;" onclick="closeAddTeamModal()">取消</button>
            </div>
        </div>
    </div>

    <!-- ===== 删除团队确认 ===== -->
    <div class="modal-overlay" id="deleteTeamModal">
        <div class="modal-box">
            <div style="font-size:48px;text-align:center;margin-bottom:12px;">⚠️</div>
            <div style="text-align:center;color:#e53e3e;font-weight:600;margin-bottom:8px;">确定删除该团队？</div>
            <div class="text-muted text-sm" style="text-align:center;margin-bottom:16px;" id="deleteTeamDetail">不可恢复！</div>
            <div style="display:flex;gap:10px;">
                <button class="btn btn-danger" style="flex:1;" onclick="confirmDeleteTeam()">🗑 确认</button>
                <button class="btn btn-outline" style="flex:1;" onclick="closeDeleteTeamModal()">取消</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        //  ===== 第一部分：腾讯云开发初始化 =====
        // ============================================================

        // ⚠️ 重要：替换成你的环境ID
        var ENV_ID = 'sunlion-1-d3g7qiwbv2dcdfb51';

        // 初始化云开发
        var app = cloudbase.init({
            env: ENV_ID
        });

        var db = app.database();

        // 集合名称
        var TEAMS_COLLECTION = 'teams';
        var LINEUPS_COLLECTION = 'lineups';

        // 检查云开发连接状态
        async function checkCloudConnection() {
            try {
                await db.collection(TEAMS_COLLECTION).limit(1).get();
                document.getElementById('connectionStatus').textContent = '☁️ 已连接到云端';
                document.getElementById('connectionStatus').style.color = '#38a169';
                return true;
            } catch (e) {
                document.getElementById('connectionStatus').textContent = '⚠️ 未连接云端，请检查环境ID';
                document.getElementById('connectionStatus').style.color = '#e53e3e';
                console.error('云开发连接失败:', e);
                return false;
            }
        }

        // ============================================================
        //  ===== 第二部分：数据操作（读写云数据库） =====
        // ============================================================

        // 获取所有团队
        async function fetchTeams() {
            try {
                var res = await db.collection(TEAMS_COLLECTION).get();
                return res.data || [];
            } catch (e) {
                console.error('获取团队失败:', e);
                return [];
            }
        }

        // 获取单个团队
        async function fetchTeam(teamId) {
            try {
                var res = await db.collection(TEAMS_COLLECTION).where({ _id: teamId }).get();
                return res.data.length > 0 ? res.data[0] : null;
            } catch (e) {
                console.error('获取团队失败:', e);
                return null;
            }
        }

        // 添加团队
        async function addTeamToCloud(name) {
            try {
                var res = await db.collection(TEAMS_COLLECTION).add({
                    name: name,
                    members: [],
                    createdAt: new Date()
                });
                return res;
            } catch (e) {
                console.error('添加团队失败:', e);

        // 更新团队
        async function updateTeamInCloud(teamId, data) {
            try {
                await db.collection(TEAMS_COLLECTION).doc(teamId).update(data);
                return true;
            } catch (e) {
                console.error('更新团队失败:', e);

        // 删除团队
        async function deleteTeamFromCloud(teamId) {
            try {
                await db.collection(TEAMS_COLLECTION).doc(teamId).remove();
                // 同时删除对应的排阵数据
                await db.collection(LINEUPS_COLLECTION).where({ teamId: teamId }).remove();
                return true;
            } catch (e) {
                console.error('删除团队失败:', e);
                throw e;
            }
        }

        // 获取团队的排阵数据
        async function fetchLineup(teamId) {
            try {
                var res = await db.collection(LINEUPS_COLLECTION).where({ teamId: teamId }).get();
                return res.data.length > 0 ? res.data[0] : null;
            } catch (e) {
                console.error('获取排阵数据失败:', e);
                return null;
            }
        }

        // 保存排阵数据
        async function saveLineupToCloud(teamId, lineupData) {
            try {
                // 先检查是否已存在
                var existing = await db.collection(LINEUPS_COLLECTION).where({ teamId: teamId }).get();
                if (existing.data.length > 0) {
                    // 更新
                    await db.collection(LINEUPS_COLLECTION).doc(existing.data[0]._id).update({
                        steps: lineupData.steps || [],
                        currentCourt: lineupData.currentCourt || [],
                        usedPlayers: lineupData.usedPlayers || [],
                        completed: lineupData.completed || false,
                        updatedAt: new Date()
                    });
                } else {
                    // 新增
                    await db.collection(LINEUPS_COLLECTION).add({
                        teamId: teamId,
                        steps: lineupData.steps || [],
                        currentCourt: lineupData.currentCourt || [],
                        usedPlayers: lineupData.usedPlayers || [],
                        completed: lineupData.completed || false,
                        createdAt: new Date(),
                        updatedAt: new Date()
                    });
                }
                return true;
            } catch (e) {
                console.error('保存排阵数据失败:', e);
                throw e;
            }
        }

        // 获取所有团队的排阵数据（用于汇总）
        async function fetchAllLineups() {
            try {
                var res = await db.collection(LINEUPS_COLLECTION).get();
                return res.data || [];
            } catch (e) {
                console.error('获取所有排阵数据失败:', e);
                return [];
            }
        }

        // ============================================================
        //  ===== 第三部分：本地缓存和全局状态 =====
        // ============================================================

        var LOCAL_STORAGE_KEY = 'lineup_cloud_cache';

        // 从云端加载数据到本地
        async function syncFromCloud() {
            showToast('⏳ 正在同步...');

            try {
                var teams = await fetchTeams();
                var allLineups = await fetchAllLineups();

                // 构建本地缓存
                var cache = {
                    teams: teams,
                    lineups: {}
                };

                for (var i = 0; i < allLineups.length; i++) {
                    var l = allLineups[i];
                    cache.lineups[l.teamId] = {
                        steps: l.steps || [],
                        currentCourt: l.currentCourt || [],
                        usedPlayers: l.usedPlayers || [],
                        completed: l.completed || false
                    };
                }

                localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(cache));

                // 更新当前团队ID
                if (teams.length > 0) {
                    var data = getAppData();
                    if (!data.currentTeamId || !teams.some(function(t) { return t._id === data.currentTeamId; })) {
                        data.currentTeamId = teams[0]._id;
                        saveAppData(data);
                    }
                }

                showToast('✅ 同步成功！');
                renderAll();
            } catch (e) {
                console.error('同步失败:', e);
                showToast('⚠️ 同步失败: ' + e.message);
            }
        }

        // 从本地缓存获取数据
        function getCachedData() {
            try {
                var raw = localStorage.getItem(LOCAL_STORAGE_KEY);
                if (raw) {
                    var data = JSON.parse(raw);
                    if (data.teams) {
                        return data;
                    }
                }
            } catch (e) {
                console.error('读取缓存失败:', e);
            }
            return { teams: [], lineups: {} };
        }

        // ============================================================
        //  ===== 第四部分：UI 渲染 =====
        // ============================================================

        var selectedReplaceGender = null;
        var selectedFillPlayers = [];

        function getAppData() {
            try {
                var raw = localStorage.getItem('lineup_app_config');
                if (raw) {
                    var data = JSON.parse(raw);
                    if (data.currentTeamId !== undefined) {
                        return data;
                    }
                }
            } catch (e) { console.error('读取配置失败', e); }
            return { currentTeamId: null };
        }

        function saveAppData(data) {
            localStorage.setItem('lineup_app_config', JSON.stringify(data));
        }

        function getCurrentTeam() {
            var config = getAppData();
            var cache = getCachedData();
            if (config.currentTeamId) {
                for (var i = 0; i < cache.teams.length; i++) {
                    if (cache.teams[i]._id === config.currentTeamId) {
                        return cache.teams[i];
                    }
                }
            }
            return cache.teams.length > 0 ? cache.teams[0] : null;
        }

        function getTeamLineup(teamId) {
            var cache = getCachedData();
            return cache.lineups[teamId] || null;
        }

        function renderTeams() {
            var cache = getCachedData();
            var container = document.getElementById('teamSelector');
            if (!container) return;

            var config = getAppData();

            if (cache.teams.length === 0) {
                container.innerHTML = '<span class="text-muted text-sm">暂无团队，请创建</span>';
                var nameEl = document.getElementById('currentTeamName');
                if (nameEl) nameEl.textContent = '-';
                return;
            }

            var html = '';
            for (var i = 0; i < cache.teams.length; i++) {
                var team = cache.teams[i];
                var active = team._id === config.currentTeamId ? 'active' : '';
                html += '<span class="team-tab ' + active + '">' +
                    '<span onclick="switchTeam(\'' + team._id + '\')">' +
                    team.name +
                    '<span class="count">(' + (team.members ? team.members.length : 0) + ')</span>' +
                    '</span>' +
                    '<button class="delete-team-btn" onclick="event.stopPropagation();showDeleteTeamModal(\'' + team._id +
                    '\')">×</button>' +
                    '</span>';
            }
            container.innerHTML = html;

            var current = getCurrentTeam();
            var nameEl = document.getElementById('currentTeamName');
            if (nameEl) nameEl.textContent = current ? current.name : '-';
        }

        function switchTeam(teamId) {
            var config = getAppData();
            config.currentTeamId = teamId;
            saveAppData(config);
            renderTeams();
            renderMembers();
            renderFillPage();
            renderDataPage();
            var qrContainer = document.getElementById('qrcode');
            if (qrContainer) qrContainer.innerHTML = '';
            var shareLink = document.getElementById('shareLink');
            if (shareLink) shareLink.value = '';
        }

        function renderMembers() {
            var team = getCurrentTeam();
            var members = team && team.members ? team.members : [];
            var container = document.getElementById('memberList');
            if (!container) return;
            var countEl = document.getElementById('memberCount');
            if (countEl) countEl.textContent = members.length;
            var male = 0,
                female = 0;
            for (var i = 0; i < members.length; i++) {
                if (members[i].gender === 'male') male++;
                else female++;
            }
            var statsEl = document.getElementById('genderStats');
            if (statsEl) statsEl.textContent = '👨 ' + male + ' · 👩 ' + female;
            if (members.length === 0) {
                container.innerHTML = '<div class="empty">还没有成员</div>';
                return;
            }
            var html = '';
            for (var i = 0; i < members.length; i++) {
                var m = members[i];
                var genderClass = m.gender === 'male' ? 'gender-m' : 'gender-f';
                var genderIcon = m.gender === 'male' ? '♂' : '♀';
                html += '<span class="member-tag">' +
                    m.name +
                    '<span class="gender-badge ' + genderClass + '">' + genderIcon + '</span>' +
                    '<button class="remove-btn" onclick="removeMember(' + i + ')">×</button>' +
                    '</span>';
            }
            container.innerHTML = html;
        }

        // ============================================================
        //  ===== 第五部分：成员操作（同步云端） =====
        // ============================================================

        async function addMember() {
            var nameInput = document.getElementById('memberName');
            var genderSelect = document.getElementById('memberGender');
            if (!nameInput || !genderSelect) { showToast('⚠️ 页面元素未加载'); return; }
            var name = nameInput.value.trim();
            var gender = genderSelect.value;
            if (!name) { showToast('⚠️ 请输入姓名');
                nameInput.focus(); return; }

            var team = getCurrentTeam();
            if (!team) { showToast('⚠️ 未找到团队'); return; }

            var members = team.members || [];
            for (var i = 0; i < members.length; i++) {
                if (members[i].name === name) { showToast('⚠️ 该成员已存在');
                    nameInput.value = '';
                    nameInput.focus(); return; }
            }

            members.push({ name: name, gender: gender });

            // 更新云端
            try {
                await updateTeamInCloud(team._id, { members: members });
                // 清除排阵缓存
                var cache = getCachedData();
                if (cache.lineups[team._id]) {
                    delete cache.lineups[team._id];
                    localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(cache));
                }
                await syncFromCloud();
                nameInput.value = '';
                nameInput.focus();
                showToast('✅ 已添加 ' + name);
            } catch (e) {
                showToast('⚠️ 添加失败: ' + e.message);
            }
        }

        async function removeMember(index) {
            var team = getCurrentTeam();
            if (!team) return;
            var members = team.members || [];
            var removed = members[index].name;
            if (!confirm('移除「' + removed + '」？')) return;
            members.splice(index, 1);

            try {
                await updateTeamInCloud(team._id, { members: members });
                var cache = getCachedData();
                if (cache.lineups[team._id]) {
                    delete cache.lineups[team._id];
                    localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(cache));
                }
                await syncFromCloud();
                showToast('已移除 ' + removed);
            } catch (e) {
                showToast('⚠️ 移除失败: ' + e.message);
            }
        }

        async function clearTeamMembers() {
            var team = getCurrentTeam();
            if (!team) return;
            var members = team.members || [];
            if (members.length === 0) { showToast('暂无成员'); return; }
            if (!confirm('清空所有成员？')) return;

            try {
                await updateTeamInCloud(team._id, { members: [] });
                var cache = getCachedData();
                if (cache.lineups[team._id]) {
                    delete cache.lineups[team._id];
                    localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(cache));
                }
                await syncFromCloud();
                showToast('已清空');
            } catch (e) {
                showToast('⚠️ 清空失败: ' + e.message);
            }
        }

        async function loadExample() {
            var team = getCurrentTeam();
            if (!team) return;
            var members = team.members || [];
            if (members.length > 0) {
                if (!confirm('覆盖当前成员？')) return;
            }

            var examples = [
                { name: '张伟', gender: 'male' },
                { name: '李娜', gender: 'female' },
                { name: '王强', gender: 'male' },
                { name: '刘洋', gender: 'female' },
                { name: '陈明', gender: 'male' },

        // ============================================================
        //  ===== 第六部分：排阵填报 =====
        // ============================================================

        function renderFillPage() {
            var container = document.getElementById('fillContainer');
            if (!container) return;
            var team = getCurrentTeam();
            var teamNameEl = document.getElementById('fillTeamName');
            if (teamNameEl) teamNameEl.textContent = team ? team.name : '-';

            if (!team || !team.members || team.members.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="icon">📝</div><p>请先在「成员管理」中添加成员</p></div>';
                return;
            }

            var fillData = getTeamLineup(team._id);

            if (fillData && fillData.completed) {
                container.innerHTML = renderCompletedView(team, fillData);
                return;
            }

            var allMembers = team.members;
            var usedPlayers = fillData ? fillData.usedPlayers || [] : [];
            var allUsed = true;
            for (var i = 0; i < allMembers.length; i++) {
                if (usedPlayers.indexOf(allMembers[i].name) === -1) { allUsed = false; break; }
            }

            if (allUsed && fillData && fillData.steps && fillData.steps.length > 0) {
                fillData.completed = true;
                saveLineupToCloud(team._id, fillData);
                container.innerHTML = renderCompletedView(team, fillData);
                return;
            }

            container.innerHTML = renderFillForm(team, fillData);
        }

        function renderFillForm(team, fillData) {
            var steps = fillData ? fillData.steps || [] : [];
            var currentCourt = fillData ? fillData.currentCourt || [] : [];
            var usedPlayers = fillData ? fillData.usedPlayers || [] : [];
            var stepNum = steps.length + 1;
            var isFirstStep = steps.length === 0;

            var availablePlayers = [];
            for (var i = 0; i < team.members.length; i++) {
                if (usedPlayers.indexOf(team.members[i].name) === -1) {
                    availablePlayers.push(team.members[i]);
                }
            }

            var html = '';

            var totalSteps = team.members.length - 1;
            if (totalSteps > 0) {
                html += '<div class="step-indicator">';
                for (var i = 1; i <= totalSteps; i++) {
                    var cls = 'step-dot';
                    if (i < stepNum) cls += ' done';
                    if (i === stepNum) cls += ' active';
                    html += '<span class="' + cls + '">' + i + '</span>';
                }
                html += '</div>';
            }

            html += '<div class="lineup-step-card" style="border-color:#48bb78;">';
            html += '<div class="step-header">';
            html += '<span class="step-number">📍 第 ' + stepNum + ' 步</span>';
            html += '<span class="step-action start">' + (isFirstStep ? '🌟 首发' : '🔄 换人') + '</span>';
            html += '</div>';

            html += '<div style="margin-bottom:8px;font-weight:600;color:#2d3748;">当前场上：</div>';
            html += '<div class="court-slots">';
            var courtMale = null,
                courtFemale = null;
            for (var i = 0; i < currentCourt.length; i++) {
                if (currentCourt[i].gender === 'male') courtMale = currentCourt[i];
                else courtFemale = currentCourt[i];
            }
            html += '<div class="court-slot ' + (courtMale ? 'filled' : '') + '">';
            html += '<div class="slot-label">♂ 男</div>';
            html += '<div class="slot-name">' + (courtMale ? courtMale.name : '—') + '</div>';
            html += '</div>';
            html += '<div class="court-slot ' + (courtFemale ? 'filled' : '') + '">';
            html += '<div class="slot-label">♀ 女</div>';
            html += '<div class="slot-name">' + (courtFemale ? courtFemale.name : '—') + '</div>';
            html += '</div>';
            html += '</div>';

            if (!isFirstStep) {
                var lastStep = steps[steps.length - 1];
                html += '<div class="sub-info">⬇ ' + (lastStep.substitutedOut || '') + ' 下场 → ⬆ ' + (lastStep
                    .substitutedIn || '') + ' 上场</div>';
            }

            html += '</div>';

            if (availablePlayers.length > 0) {
                if (isFirstStep) {
                    html += '<div style="margin-top:12px;font-weight:600;color:#2d3748;">请选择首发（1男 + 1女）：</div>';
                    html += '<div class="member-select-grid" id="fillMemberGrid">';
                    for (var i = 0; i < availablePlayers.length; i++) {
                        var p = availablePlayers[i];
                        var icon = p.gender === 'male' ? '♂' : '♀';
                        html += '<span class="member-option" onclick="selectFillPlayer(\'' + p.name + '\', \'' + p
                            .gender + '\')" data-name="' + p.name + '">' + p.name + ' ' + icon + '</span>';
                    }
                    html += '</div>';
                    html += '<div class="mt-12">';
                    html += '<button class="btn btn-success" onclick="confirmFillStep()" id="confirmFillBtn" disabled>';
                    html += '✅ 确认首发';
                    html += '</button>';
                    html += ' <span class="text-muted text-sm" id="fillSelectionStatus">请选择 1男 + 1女</span>';
                    html += '</div>';
                } else {
                    var hasMaleOnCourt = false;
                    var hasFemaleOnCourt = false;
                    for (var i = 0; i < currentCourt.length; i++) {
                        if (currentCourt[i].gender === 'male') hasMaleOnCourt = true;
                        else hasFemaleOnCourt = true;
                    }

                    var hasAvailableMale = false;
                    var hasAvailableFemale = false;
                    for (var i = 0; i < availablePlayers.length; i++) {
                        if (availablePlayers[i].gender === 'male') hasAvailableMale = true;
                        else hasAvailableFemale = true;
                    }

                    html += '<div style="margin-top:12px;font-weight:600;color:#2d3748;">第一步：选择换下的性别</div>';
                    html += '<div class="gender-select-group">';
                    html += '<button class="gender-btn" id="genderBtnMale" onclick="selectReplaceGender(\'male\')" ' +
                        (hasMaleOnCourt && hasAvailableMale ? '' : 'disabled') + '>♂ 换男</button>';
                    html += '<button class="gender-btn" id="genderBtnFemale" onclick="selectReplaceGender(\'female\')" ' +
                        (hasFemaleOnCourt && hasAvailableFemale ? '' : 'disabled') + '>♀ 换女</button>';
                    html += '</div>';

                    html += '<div class="text-muted text-sm" id="selectedGenderDisplay" style="margin-bottom:8px;">';
                    if (selectedReplaceGender === 'male') html += '已选择：换下 ♂ 男队员';
                    else if (selectedReplaceGender === 'female') html += '已选择：换下 ♀ 女队员';
                    else html += '请先选择换下的性别';
                    html += '</div>';

                    html += '<div style="margin-top:8px;font-weight:600;color:#2d3748;">第二步：选择上场的队员</div>';
                    html += '<div class="member-select-grid" id="fillMemberGrid">';

                    var filtered = [];
                    if (selectedReplaceGender) {
                        for (var i = 0; i < availablePlayers.length; i++) {
                            if (availablePlayers[i].gender === selectedReplaceGender) {
                                filtered.push(availablePlayers[i]);
                            }
                        }
                    }

                    if (filtered.length === 0 && selectedReplaceGender) {
                        html += '<span class="text-muted text-sm">没有符合条件的队员</span>';
                    } else if (!selectedReplaceGender) {
                        html += '<span class="text-muted text-sm">请先选择换下的性别</span>';
                    } else {
                        for (var i = 0; i < filtered.length; i++) {
                            var p = filtered[i];
                            var icon = p.gender === 'male' ? '♂' : '♀';
                            html += '<span class="member-option" onclick="selectFillPlayer(\'' + p.name + '\', \'' + p
                                .gender + '\')" data-name="' + p.name + '">' + p.name + ' ' + icon + '</span>';
                        }
                    }
                    html += '</div>';

                    html += '<div class="mt-12">';
                    html += '<button class="btn btn-success" onclick="confirmFillStep()" id="confirmFillBtn" disabled>';
                    html += '✅ 确认换人';
                    html += '</button>';
                    html += ' <span class="text-muted text-sm" id="fillSelectionStatus">请选择要上场的队员</span>';
                    html += '</div>';
                }
            } else {
                html += '<div class="empty-state"><div class="icon">🎉</div><p>所有队员都已上场！排阵完成</p></div>';
                if (fillData) {
                    fillData.completed = true;
                    saveLineupToCloud(team._id, fillData);
                }
                setTimeout(function() { renderFillPage(); }, 500);
            }

            return html;
        }

        function selectReplaceGender(gender) {
            selectedReplaceGender = gender;
            selectedFillPlayers = [];

            var btnMale = document.getElementById('genderBtnMale');
            var btnFemale = document.getElementById('genderBtnFemale');
            if (btnMale) btnMale.className = 'gender-btn' + (gender === 'male' ? ' active-male' : '');
            if (btnFemale) btnFemale.className = 'gender-btn' + (gender === 'female' ? ' active-female' : '');

            var display = document.getElementById('selectedGenderDisplay');
            if (display) {
                if (gender === 'male') display.textContent = '已选择：换下 ♂ 男队员';
                else display.textContent = '已选择：换下 ♀ 女队员';
            }

            var team = getCurrentTeam();
            if (team) {
                var fillData = getTeamLineup(team._id);
                var grid = document.getElementById('fillMemberGrid');
                if (grid) {
                    var availablePlayers = [];
                    var usedPlayers = fillData ? fillData.usedPlayers || [] : [];
                    for (var i = 0; i < team.members.length; i++) {
                        if (usedPlayers.indexOf(team.members[i].name) === -1) {
                            availablePlayers.push(team.members[i]);
                        }
                    }
                    var filtered = [];
                    for (var i = 0; i < availablePlayers.length; i++) {
                        if (availablePlayers[i].gender === gender) {
                            filtered.push(availablePlayers[i]);
                        }
                    }
                    var html = '';
                    if (filtered.length === 0) {
                        html = '<span class="text-muted text-sm">没有符合条件的队员</span>';
                    } else {
                        for (var i = 0; i < filtered.length; i++) {
                            var p = filtered[i];
                            var icon = p.gender === 'male' ? '♂' : '♀';
                            html += '<span class="member-option" onclick="selectFillPlayer(\'' + p.name + '\', \'' + p
                                .gender + '\')" data-name="' + p.name + '">' + p.name + ' ' + icon + '</span>';
                        }
                    }
                    grid.innerHTML = html;
                }
            }

            var status = document.getElementById('fillSelectionStatus');
            if (status) status.textContent = '请选择要上场的队员';
            var btn = document.getElementById('confirmFillBtn');
            if (btn) btn.disabled = true;
        }

        function selectFillPlayer(name, gender) {
            var team = getCurrentTeam();
            if (!team) return;
            var fillData = getTeamLineup(team._id);
            var isFirstStep = fillData ? fillData.steps.length === 0 : true;

            if (isFirstStep) {
                var existing = selectedFillPlayers.find(function(p) { return p.name === name; });
                if (existing) {
                    selectedFillPlayers = selectedFillPlayers.filter(function(p) { return p.name !== name; });
                } else {
                    var sameGender = selectedFillPlayers.find(function(p) { return p.gender === gender; });
                    if (sameGender) {
                        selectedFillPlayers = selectedFillPlayers.filter(function(p) { return p.gender !== gender; });
                    }
                    selectedFillPlayers.push({ name: name, gender: gender });
                }

                var grid = document.getElementById('fillMemberGrid');
                if (grid) {
                    var options = grid.querySelectorAll('.member-option');
                    for (var i = 0; i < options.length; i++) {
                        var opt = options[i];
                        var optName = opt.getAttribute('data-name');
                        var isSelected = selectedFillPlayers.some(function(p) { return p.name === optName; });
                        opt.classList.toggle('selected', isSelected);
                    }
                }

                var btn = document.getElementById('confirmFillBtn');
                var status = document.getElementById('fillSelectionStatus');
                if (btn && status) {
                    var hasMale = selectedFillPlayers.some(function(p) { return p.gender === 'male'; });
                    var hasFemale = selectedFillPlayers.some(function(p) { return p.gender === 'female'; });
                    if (hasMale && hasFemale) {
                        btn.disabled = false;
                        status.textContent = '✅ 已选 1男 + 1女';
                    } else {
                        btn.disabled = true;
                        status.textContent = '请选择 1男 + 1女';
                    }
                }
            } else {
                if (selectedReplaceGender && gender !== selectedReplaceGender) {
                    showToast('⚠️ 请选择 ' + (selectedReplaceGender === 'male' ? '男' : '女') + ' 队员');
                    return;
                }
                var existing = selectedFillPlayers.find(function(p) { return p.name === name; });
                if (existing) {
                    selectedFillPlayers = [];
                } else {
                    selectedFillPlayers = [{ name: name, gender: gender }];
                }

                var grid = document.getElementById('fillMemberGrid');
                if (grid) {
                    var options = grid.querySelectorAll('.member-option');
                    for (var i = 0; i < options.length; i++) {
                        var opt = options[i];
                        var optName = opt.getAttribute('data-name');
                        var isSelected = selectedFillPlayers.some(function(p) { return p.name === optName; });
                        opt.classList.toggle('selected', isSelected);
                    }
                }

                var btn = document.getElementById('confirmFillBtn');
                var status = document.getElementById('fillSelectionStatus');
                if (btn && status) {
                    if (selectedFillPlayers.length === 1) {
                        btn.disabled = false;
                        status.textContent = '✅ 已选 ' + selectedFillPlayers[0].name;
                    } else {
                        btn.disabled = true;
                        status.textContent = '请选择要上场的队员';
                    }
                }
            }
        }

        async function confirmFillStep() {
            var team = getCurrentTeam();
            if (!team) { showToast('⚠️ 未找到团队'); return; }

            var fillData = getTeamLineup(team._id);
            if (!fillData) {
                fillData = { steps: [], currentCourt: [], usedPlayers: [], completed: false };
            }

            var isFirstStep = fillData.steps.length === 0;

            if (selectedFillPlayers.length === 0) {
                showToast('⚠️ 请先选择队员');
                return;
            }

            var currentCourt = fillData.currentCourt || [];
            var usedPlayers = fillData.usedPlayers || [];
            var steps = fillData.steps || [];
            var stepNum = steps.length + 1;

            var newCourt = [];
            var subOut = null;
            var subIn = null;

            if (isFirstStep) {
                var male = selectedFillPlayers.find(function(p) { return p.gender === 'male'; });
                var female = selectedFillPlayers.find(function(p) { return p.gender === 'female'; });
                if (!male || !female) { showToast('⚠️ 请选择 1男 + 1女'); return; }
                newCourt = [male, female];
                usedPlayers = [male.name, female.name];
                steps.push({
                    step: stepNum,
                    action: '首发',
                    onCourt: [{ name: male.name, gender: male.gender }, { name: female.name, gender: female.gender }],
                    substitutedOut: null,
                    substitutedIn: null
                });
            } else {
                var selected = selectedFillPlayers[0];
                var toReplace = null;
                for (var i = 0; i < currentCourt.length; i++) {
                    if (currentCourt[i].gender === selected.gender) {
                        toReplace = currentCourt[i];
                        break;
                    }
                }
                if (!toReplace) {
                    showToast('⚠️ 场上没有同性别队员可换');
                    return;
                }

                subOut = toReplace;
                subIn = selected;

                newCourt = [];
                for (var i = 0; i < currentCourt.length; i++) {
                    if (currentCourt[i].name !== toReplace.name) {
                        newCourt.push(currentCourt[i]);
                    }
                }
                newCourt.push(selected);
                usedPlayers.push(selected.name);

                steps.push({
                    step: stepNum,
                    action: '换人',
                    onCourt: newCourt.map(function(p) { return { name: p.name, gender: p.gender }; }),
                    substitutedOut: subOut.name,
                    substitutedIn: subIn.name
                });
            }

            fillData.currentCourt = newCourt;
            fillData.usedPlayers = usedPlayers;
            fillData.steps = steps;

            var allMembers = team.members;
            var allUsed = true;
            for (var i = 0; i < allMembers.length; i++) {
                if (usedPlayers.indexOf(allMembers[i].name) === -1) { allUsed = false; break; }
            }
            if (allUsed && steps.length > 0) {
                fillData.completed = true;
            }

            try {
                await saveLineupToCloud(team._id, fillData);
                await syncFromCloud();
                selectedFillPlayers = [];
                selectedReplaceGender = null;
                renderFillPage();
                renderDataPage();
                showToast('✅ 第 ' + stepNum + ' 步确认完成');
            } catch (e) {
                showToast('⚠️ 保存失败: ' + e.message);
            }
        }

            html += '<div class="icon">🎉</div>';
            html += '<h3 style="color:#276749;">排阵已完成！</h3>';
            html += '<p class="text-muted">所有 ' + team.members.length + ' 名队员都已上场</p>';

        }

        // 导出所有团队的排阵为CSV
        function exportAllFillDataCSV() {
            var cache = getCachedData();
            var allLineups = cache.lineups || {};
            var teams = cache.teams || [];

            var csv = '团队,步骤,动作,场上1,场上2,换下,换上,时间\n';
            var now = new Date().toLocaleString();

            for (var i = 0; i < teams.length; i++) {
                var team = teams[i];
                var lineup = allLineups[team._id];
                if (!lineup || !lineup.steps || lineup.steps.length === 0) continue;

                for (var j = 0; j < lineup.steps.length; j++) {
                    var s = lineup.steps[j];
                    var p1 = s.onCourt[0] ? s.onCourt[0].name : '';
                    var p2 = s.onCourt[1] ? s.onCourt[1].name : '';
                    csv += team.name + ',' + s.step + ',' + (s.action === '首发' ? '首发' : '换人') +
                        ',' + p1 + ',' + p2 + ',' + (s.substitutedOut || '') + ',' + (s.substitutedIn || '') + ',' +
                        now + '\n';
                }
            }

            if (csv === '团队,步骤,动作,场上1,场上2,换下,换上,时间\n') {
                showToast('⚠️ 暂无数据可导出');
                return;
            }

            var blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
            var link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = '所有团队出场名单_' + new Date().toISOString().slice(0, 10) + '.csv';
            link.click();
            showToast('✅ 汇总CSV导出成功');
        }

        function generateShareQR() {
            var team = getCurrentTeam();
            if (!team) { showToast('请选择团队'); return; }

            var fillData = getTeamLineup(team._id);

            var shareData = {
                teamId: team._id,
                teamName: team.name,
                members: team.members || [],
                fillData: fillData || { steps: [], currentCourt: [], usedPlayers: [], completed: false },
                mode: 'fill'
            };

            var encoded = encodeURIComponent(JSON.stringify(shareData));
            var url = window.location.origin + window.location.pathname + '?fill=' + encoded;

            var linkInput = document.getElementById('shareLink');
            if (linkInput) linkInput.value = url;

            var container = document.getElementById('qrcode');
            if (!container) return;
            container.innerHTML = '';
            try {
                new QRCode(container, {
                    text: url,
                    width: 200,
                    height: 200,
                    colorDark: '#1a202c',
                    colorLight: '#ffffff',
                    correctLevel: QRCode.CorrectLevel.H
                });
                showToast('✅ 二维码已生成');
            } catch (e) {
                showToast('⚠️ 生成失败，请检查网络');
                console.error(e);
            }
        }

        function copyShareLink() {
            var input = document.getElementById('shareLink');
            if (!input || !input.value) { showToast('请先生成二维码'); return; }
            input.select();
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(input.value).then(function() { showToast('✅ 已复制'); })['catch'](function() {
                    document.execCommand('copy');
                    showToast('✅ 已复制'); });
            } else {
                document.execCommand('copy');
                showToast('✅ 已复制');
            }
        }

        function initFillMode() {
            var params = new URLSearchParams(window.location.search);
            var fillData = params.get('fill');
            if (fillData) {
                try {
                    var data = JSON.parse(decodeURIComponent(fillData));
                    if (data.mode === 'fill') {
                        renderFillPageForCaptain(data);
                        return true;
                    }
                } catch (e) { console.error('解析失败', e); }
            }
            return false;
        }

        var captainTeamData = null;

        function renderFillPageForCaptain(data) {
            var app = document.querySelector('.app');
            if (!app) return;

            captainTeamData = data;
            captainSelected = [];
            captainSelectedGender = null;

            var fillData = data.fillData || { steps: [], currentCourt: [], usedPlayers: [], completed: false };
            var members = data.members || [];

            if (fillData.completed) {
                app.innerHTML = renderCaptainCompletedView(data, fillData);
                return;
            }

            var allUsed = true;
            for (var i = 0; i < members.length; i++) {
                if (fillData.usedPlayers.indexOf(members[i].name) === -1) { allUsed = false; break; }
            }
            if (allUsed && fillData.steps.length > 0) {
                fillData.completed = true;
                app.innerHTML = renderCaptainCompletedView(data, fillData);
                return;
            }

            app.innerHTML = renderCaptainFillForm(data, fillData);
