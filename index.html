        function handleImport(event) {
            var file = event.target.files[0];
            if (!file) return;

            var reader = new FileReader();
            reader.onload = function(e) {
                try {
                    var data = JSON.parse(e.target.result);
                    if (data.teams && data.currentTeamId !== undefined) {
                        if (!data.versions) data.versions = {};
                        if (confirm('导入将覆盖当前所有数据，确认？')) {
                            saveAppData(data);
                            renderAll();
                            showToast('✅ 导入成功');
                        }
                    } else {
                        showToast('⚠️ 无效文件');
                    }
                } catch (err) {
                    showToast('⚠️ 解析失败');
                    console.error(err);
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        // ============================================================
        //  扫码填报模式（队长端）
        // ============================================================
        function initFillMode() {
            var params = new URLSearchParams(window.location.search);
            var fillData = params.get('fill');
            if (fillData) {
                try {
                    var data = JSON.parse(decodeURIComponent(fillData));
                    if (data.mode === 'fill') {
                        renderFillPageForCaptain(data);
                        return true;
                    }
                } catch (e) { console.error('解析失败', e); }
            }
            return false;
        }

        var captainTeamData = null;
        var captainSelected = [];
        var captainSelectedGender = null;

        function renderFillPageForCaptain(data) {
            var app = document.querySelector('.app');
            if (!app) return;

            captainTeamData = data;
            captainSelected = [];
            captainSelectedGender = null;

            var fillData = data.fillData || { steps: [], currentCourt: [], usedPlayers: [], completed: false };
            var members = data.members || [];

            if (fillData.completed) {
                app.innerHTML = renderCaptainCompletedView(data, fillData);
                return;
            }

            var allUsed = true;
            for (var i = 0; i < members.length; i++) {
                if (fillData.usedPlayers.indexOf(members[i].name) === -1) { allUsed = false; break; }
            }
            if (allUsed && fillData.steps.length > 0) {
                fillData.completed = true;
                app.innerHTML = renderCaptainCompletedView(data, fillData);
                return;
            }

            app.innerHTML = renderCaptainFillForm(data, fillData);
        }

        function renderCaptainFillForm(team, fillData) {

            var currentCourt = fillData.currentCourt || [];
            var usedPlayers = fillData.usedPlayers || [];
            var stepNum = steps.length + 1;
            var isFirstStep = steps.length === 0;

            var availablePlayers = [];
            for (var i = 0; i < team.members.length; i++) {
                if (usedPlayers.indexOf(team.members[i].name) === -1) {
                    availablePlayers.push(team.members[i]);
                }
            }

            var html = '<div class="card" style="max-width:600px;margin:0 auto;">';
            html += '<div class="flex-between">';

            html += '<p class="subtitle">' + team.teamName + ' · 第 ' + stepNum + ' 步</p></div>';
            html += '<span class="badge badge-blue">扫码填报</span>';
            html += '</div>';

            var totalSteps = team.members.length - 1;
            if (totalSteps > 0) {
                html += '<div class="step-indicator">';
                for (var i = 1; i <= totalSteps; i++) {
                    var cls = 'step-dot';
                    if (i < stepNum) cls += ' done';
                    if (i === stepNum) cls += ' active';

                html += '</div>';
            }

            html += '<div class="lineup-step-card" style="border-color:#48bb78;">';
            html += '<div class="step-header">';
            html += '<span class="step-number">📍 当前阵容</span>';
            html += '<span class="step-action start">' + (isFirstStep ? '🌟 首发' : '🔄 换人') + '</span>';
            html += '</div>';
            html += '<div class="court-slots">';
            var courtMale = null,
                courtFemale = null;
            for (var i = 0; i < currentCourt.length; i++) {
                if (currentCourt[i].gender === 'male') courtMale = currentCourt[i];
                else courtFemale = currentCourt[i];
            }
            html += '<div class="court-slot ' + (courtMale ? 'filled' : '') + '">';
            html += '<div class="slot-label">♂ 男</div>';
            html += '<div class="slot-name">' + (courtMale ? courtMale.name : '—') + '</div>';
            html += '</div>';
            html += '<div class="court-slot ' + (courtFemale ? 'filled' : '') + '">';
            html += '<div class="slot-label">♀ 女</div>';
            html += '<div class="slot-name">' + (courtFemale ? courtFemale.name : '—') + '</div>';
            html += '</div>';
            html += '</div>';

            if (!isFirstStep) {
                var lastStep = steps[steps.length - 1];
                html += '<div class="sub-info">⬇ ' + (lastStep.substitutedOut || '') + ' 下场 → ⬆ ' + (lastStep
                    .substitutedIn || '') + ' 上场</div>';
            }
            html += '</div>';

            if (availablePlayers.length > 0) {
                if (isFirstStep) {
                    html += '<div style="margin-top:12px;font-weight:600;color:#2d3748;">请选择首发（1男 + 1女）：</div>';
                    html += '<div class="member-select-grid" id="captainMemberGrid">';
                    for (var i = 0; i < availablePlayers.length; i++) {
                        var p = availablePlayers[i];
                        var icon = p.gender === 'male' ? '♂' : '♀';
                        html += '<span class="member-option" onclick="captainSelectPlayer(\'' + p.name + '\', \'' + p
                            .gender + '\')" data-name="' + p.name + '">' + p.name + ' ' + icon + '</span>';
                    }
                    html += '</div>';
                    html += '<div class="mt-12">';
                    html += '<button class="btn btn-success" onclick="captainConfirmStep()" id="captainConfirmBtn" disabled>';
                    html += '✅ 确认首发';
                    html += '</button>';
                    html += ' <span class="text-muted text-sm" id="captainStatus">请选择 1男 + 1女</span>';
                    html += '</div>';
                } else {
                    var hasMaleOnCourt = false;
                    var hasFemaleOnCourt = false;
                    for (var i = 0; i < currentCourt.length; i++) {
                        if (currentCourt[i].gender === 'male') hasMaleOnCourt = true;
                        else hasFemaleOnCourt = true;
                    }
                    var hasAvailableMale = false;
                    var hasAvailableFemale = false;
                    for (var i = 0; i < availablePlayers.length; i++) {
                        if (availablePlayers[i].gender === 'male') hasAvailableMale = true;
                        else hasAvailableFemale = true;
                    }

                    html += '<div style="margin-top:12px;font-weight:600;color:#2d3748;">第一步：选择换下的性别</div>';
                    html += '<div class="gender-select-group">';
                    html += '<button class="gender-btn" id="captainGenderMale" onclick="captainSelectGender(\'male\')" ' +
                        (hasMaleOnCourt && hasAvailableMale ? '' : 'disabled') + '>♂ 换男</button>';
                    html += '<button class="gender-btn" id="captainGenderFemale" onclick="captainSelectGender(\'female\')" ' +
                        (hasFemaleOnCourt && hasAvailableFemale ? '' : 'disabled') + '>♀ 换女</button>';
                    html += '</div>';

                    html += '<div class="text-muted text-sm" id="captainGenderDisplay" style="margin-bottom:8px;">';
                    if (captainSelectedGender === 'male') html += '已选择：换下 ♂ 男队员';
                    else if (captainSelectedGender === 'female') html += '已选择：换下 ♀ 女队员';
                    else html += '请先选择换下的性别';
                    html += '</div>';

                    html += '<div style="margin-top:8px;font-weight:600;color:#2d3748;">第二步：选择上场的队员</div>';
                    html += '<div class="member-select-grid" id="captainMemberGrid">';
                    var filtered = [];
                    if (captainSelectedGender) {
                        for (var i = 0; i < availablePlayers.length; i++) {
                            if (availablePlayers[i].gender === captainSelectedGender) {
                                filtered.push(availablePlayers[i]);
                            }
                        }
                    }
                    if (filtered.length === 0 && captainSelectedGender) {
                        html += '<span class="text-muted text-sm">没有符合条件的队员</span>';
                    } else if (!captainSelectedGender) {
                        html += '<span class="text-muted text-sm">请先选择换下的性别</span>';
                    } else {
                        for (var i = 0; i < filtered.length; i++) {
                            var p = filtered[i];
                            var icon = p.gender === 'male' ? '♂' : '♀';
                            html += '<span class="member-option" onclick="captainSelectPlayer(\'' + p.name + '\', \'' + p
                                .gender + '\')" data-name="' + p.name + '">' + p.name + ' ' + icon + '</span>';
                        }
                    }
                    html += '</div>';

                    html += '<div class="mt-12">';
                    html += '<button class="btn btn-success" onclick="captainConfirmStep()" id="captainConfirmBtn" disabled>';
                    html += '✅ 确认换人';
                    html += '</button>';
                    html += ' <span class="text-muted text-sm" id="captainStatus">请选择要上场的队员</span>';
                    html += '</div>';
                }
            } else {
                html += '<div class="empty-state"><div class="icon">🎉</div><p>所有队员都已上场！排阵完成</p></div>';
            }

            html += '</div>';
            return html;
        }

        function captainSelectGender(gender) {
            captainSelectedGender = gender;
            captainSelected = [];

            var btnMale = document.getElementById('captainGenderMale');
            var btnFemale = document.getElementById('captainGenderFemale');
            if (btnMale) btnMale.className = 'gender-btn' + (gender === 'male' ? ' active-male' : '');
            if (btnFemale) btnFemale.className = 'gender-btn' + (gender === 'female' ? ' active-female' : '');

            var display = document.getElementById('captainGenderDisplay');
            if (display) {
                if (gender === 'male') display.textContent = '已选择：换下 ♂ 男队员';
                else display.textContent = '已选择：换下 ♀ 女队员';
            }

            var team = captainTeamData;
            if (team) {
                var fillData = team.fillData || { steps: [], currentCourt: [], usedPlayers: [], completed: false };
                var grid = document.getElementById('captainMemberGrid');
                if (grid) {
                    var availablePlayers = [];
                    var usedPlayers = fillData.usedPlayers || [];
                    for (var i = 0; i < team.members.length; i++) {
                        if (usedPlayers.indexOf(team.members[i].name) === -1) {
                            availablePlayers.push(team.members[i]);
                        }
                    }
                    var filtered = [];
                    for (var i = 0; i < availablePlayers.length; i++) {
                        if (availablePlayers[i].gender === gender) {
                            filtered.push(availablePlayers[i]);
                        }
                    }
                    var html = '';
                    if (filtered.length === 0) {
                        html = '<span class="text-muted text-sm">没有符合条件的队员</span>';
                    } else {
                        for (var i = 0; i < filtered.length; i++) {
                            var p = filtered[i];
                            var icon = p.gender === 'male' ? '♂' : '♀';
                            html += '<span class="member-option" onclick="captainSelectPlayer(\'' + p.name + '\', \'' + p
                                .gender + '\')" data-name="' + p.name + '">' + p.name + ' ' + icon + '</span>';
                        }
                    }
                    grid.innerHTML = html;
                }
            }

            var status = document.getElementById('captainStatus');
            if (status) status.textContent = '请选择要上场的队员';
            var btn = document.getElementById('captainConfirmBtn');
            if (btn) btn.disabled = true;
        }

        function captainSelectPlayer(name, gender) {
            var team = captainTeamData;
            if (!team) return;

            var fillData = team.fillData || { steps: [], currentCourt: [], usedPlayers: [], completed: false };
            var isFirstStep = fillData.steps.length === 0;

            if (isFirstStep) {
                var existing = captainSelected.find(function(p) { return p.name === name; });
                if (existing) {
                    captainSelected = captainSelected.filter(function(p) { return p.name !== name; });
                } else {
                    var sameGender = captainSelected.find(function(p) { return p.gender === gender; });
                    if (sameGender) {
                        captainSelected = captainSelected.filter(function(p) { return p.gender !== gender; });
                    }
                    captainSelected.push({ name: name, gender: gender });
                }

                var grid = document.getElementById('captainMemberGrid');
                if (grid) {
                    var options = grid.querySelectorAll('.member-option');
                    for (var i = 0; i < options.length; i++) {
                        var opt = options[i];
                        var optName = opt.getAttribute('data-name');
                        var isSelected = captainSelected.some(function(p) { return p.name === optName; });
                        opt.classList.toggle('selected', isSelected);
                    }
                }

                var btn = document.getElementById('captainConfirmBtn');
                var status = document.getElementById('captainStatus');
                if (btn && status) {
                    var hasMale = captainSelected.some(function(p) { return p.gender === 'male'; });
                    var hasFemale = captainSelected.some(function(p) { return p.gender === 'female'; });
                    if (hasMale && hasFemale) {
                        btn.disabled = false;
                        status.textContent = '✅ 已选 1男 + 1女';
                    } else {
                        btn.disabled = true;
                        status.textContent = '请选择 1男 + 1女';
                    }
                }
            } else {
                if (captainSelectedGender && gender !== captainSelectedGender) {
                    showToast('⚠️ 请选择 ' + (captainSelectedGender === 'male' ? '男' : '女') + ' 队员');
                    return;
                }
                var existing = captainSelected.find(function(p) { return p.name === name; });
                if (existing) {
                    captainSelected = [];
                } else {
                    captainSelected = [{ name: name, gender: gender }];
                }

                var grid = document.getElementById('captainMemberGrid');
                if (grid) {
                    var options = grid.querySelectorAll('.member-option');
                    for (var i = 0; i < options.length; i++) {
                        var opt = options[i];
                        var optName = opt.getAttribute('data-name');
                        var isSelected = captainSelected.some(function(p) { return p.name === optName; });
                        opt.classList.toggle('selected', isSelected);
                    }
                }

                var btn = document.getElementById('captainConfirmBtn');
                var status = document.getElementById('captainStatus');
                if (btn && status) {
                    if (captainSelected.length === 1) {
                        btn.disabled = false;
                        status.textContent = '✅ 已选 ' + captainSelected[0].name;
                    } else {
                        btn.disabled = true;
                        status.textContent = '请选择要上场的队员';
                    }
                }
            }
        }

        function captainConfirmStep() {
            var team = captainTeamData;
            if (!team) { showToast('⚠️ 数据错误，请重新扫码'); return; }

            var fillData = team.fillData || { steps: [], currentCourt: [], usedPlayers: [], completed: false };
            var isFirstStep = fillData.steps.length === 0;

            if (captainSelected.length === 0) {
                showToast('⚠️ 请先选择队员');
                return;
            }

            var currentCourt = fillData.currentCourt || [];
            var usedPlayers = fillData.usedPlayers || [];
            var steps = fillData.steps || [];
            var stepNum = steps.length + 1;

            var newCourt = [];

            if (isFirstStep) {
                var male = captainSelected.find(function(p) { return p.gender === 'male'; });
                var female = captainSelected.find(function(p) { return p.gender === 'female'; });
                if (!male || !female) { showToast('⚠️ 请选择 1男 + 1女'); return; }
                newCourt = [male, female];
                usedPlayers = [male.name, female.name];
                steps.push({
                    step: stepNum,
                    action: '首发',
                    onCourt: [{ name: male.name, gender: male.gender }, { name: female.name, gender: female.gender }],
                    substitutedOut: null,
                    substitutedIn: null
                });
            } else {
                var selected = captainSelected[0];
                var toReplace = null;
                for (var i = 0; i < currentCourt.length; i++) {
                    if (currentCourt[i].gender === selected.gender) {
                        toReplace = currentCourt[i];
                        break;
                    }
                }
                if (!toReplace) {
                    showToast('⚠️ 场上没有同性别队员可换');
                    return;
                }

                newCourt = [];
                for (var i = 0; i < currentCourt.length; i++) {
                    if (currentCourt[i].name !== toReplace.name) {
                        newCourt.push(currentCourt[i]);
                    }
                }
                newCourt.push(selected);
                usedPlayers.push(selected.name);

                steps.push({
                    step: stepNum,
                    action: '换人',
                    onCourt: newCourt.map(function(p) { return { name: p.name, gender: p.gender }; }),
                    substitutedOut: toReplace.name,
                    substitutedIn: selected.name
                });
            }

            fillData.currentCourt = newCourt;
            fillData.usedPlayers = usedPlayers;
            fillData.steps = steps;

            var allMembers = team.members;
            var allUsed = true;
            for (var i = 0; i < allMembers.length; i++) {
                if (usedPlayers.indexOf(allMembers[i].name) === -1) { allUsed = false; break; }
            }
            if (allUsed && steps.length > 0) {
                fillData.completed = true;
            }

            var appData = getAppData();
            var targetTeam = null;
            for (var i = 0; i < appData.teams.length; i++) {
                if (appData.teams[i].id === team.teamId) { targetTeam = appData.teams[i]; break; }
            }
            if (targetTeam) {
                appData.fillData[team.teamId] = fillData;
                saveAppData(appData);
            }

            captainSelected = [];
            captainSelectedGender = null;
            showToast('✅ 第 ' + stepNum + ' 步确认完成');

            var params = new URLSearchParams(window.location.search);
            var fillParam = params.get('fill');
            if (fillParam) {
                try {
                    var data = JSON.parse(decodeURIComponent(fillParam));
                    data.fillData = fillData;
                    var encoded = encodeURIComponent(JSON.stringify(data));
                    window.location.href = window.location.pathname + '?fill=' + encoded;
                } catch (e) {
                    location.reload();
                }
            }
        }

        function renderCaptainCompletedView(team, fillData) {
            var html = '<div class="card" style="max-width:600px;margin:0 auto;">';
            html += '<div class="flex-between">';
            html += '<div><h1>🎉 排阵完成</h1>';
            html += '<p class="subtitle">' + team.teamName + '</p></div>';
            html += '<span class="badge badge-green">已完成</span>';
            html += '</div>';

            html += '<div style="margin-top:12px;">';
            for (var i = 0; i < fillData.steps.length; i++) {
                var s = fillData.steps[i];
                html += '<div class="lineup-step-card">';
                html += '<div class="step-header">';
                html += '<span class="step-number">第 ' + s.step + ' 步</span>';
                html += '<span class="step-action ' + (s.action === '首发' ? 'start' : '') + '">' +
                    (s.action === '首发' ? '🌟 首发' : '🔄 换人') + '</span>';
                html += '</div>';
                html += '<div class="court-players">';
                for (var j = 0; j < s.onCourt.length; j++) {
                    var p = s.onCourt[j];
                    html += '<span class="court-player ' + p.gender + '">' + p.name + ' ' + (p.gender === 'male' ? '♂' :
                        '♀') + '</span>';
                }
                html += '</div>';
                if (s.substitutedOut) {
                    html += '<div class="sub-info">⬇ ' + s.substitutedOut + ' 下场 → ⬆ ' + s.substitutedIn + ' 上场</div>';
                }
                html += '</div>';
            }
            html += '</div>';

            html += '<div style="margin-top:16px;padding:12px;background:#f0fff4;border-radius:10px;text-align:center;font-size:13px;color:#276749;">';
            html += '✅ 所有 ' + team.members.length + ' 名队员都已上场<br>';
            html += '💡 此页面为只读视图';
            html += '</div>';

            html += '</div>';
            return html;
        }

        // ============================================================
        //  绑定所有按钮事件（使用 addEventListener）
        // ============================================================
        function bindEvents() {
            console.log('🔗 绑定事件...');

            // 新建团队
            document.getElementById('addTeamBtn').addEventListener('click', showAddTeamModal);
            document.getElementById('confirmTeamBtn').addEventListener('click', confirmAddTeam);
            document.getElementById('closeTeamBtn').addEventListener('click', closeAddTeamModal);

            // 添加成员 - 核心
            document.getElementById('addMemberBtn').addEventListener('click', function(e) {
                console.log('点击添加成员按钮');
                addMember();
            });

            // 回车添加成员
            document.getElementById('memberName').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    addMember();
                }
            });

            // 示例数据
            document.getElementById('loadExampleBtn').addEventListener('click', loadExampleMembers);

            // 清空成员
            document.getElementById('clearMembersBtn').addEventListener('click', clearTeamMembers);

            // Tab切换
            document.querySelectorAll('.tab').forEach(function(tab) {
                tab.addEventListener('click', function() {
                    switchTab(this.dataset.tab);
                });
            });

            // 重置排阵
            document.getElementById('resetFillBtn').addEventListener('click', resetFillData);

            // 保存版本
            document.getElementById('saveVersionBtn').addEventListener('click', showSaveVersionModal);
            document.getElementById('confirmSaveVersionBtn').addEventListener('click', confirmSaveVersion);
            document.getElementById('cancelSaveVersionBtn').addEventListener('click', closeSaveVersionModal);

            // 清空版本
            document.getElementById('clearVersionsBtn').addEventListener('click', clearAllVersions);

            // 查看版本弹窗
            document.getElementById('closeViewBtn').addEventListener('click', closeViewVersionModal);
            document.getElementById('closeViewBtn2').addEventListener('click', closeViewVersionModal);
            document.getElementById('restoreVersionBtn').addEventListener('click', restoreVersion);

            // 删除团队
            document.getElementById('confirmDeleteBtn').addEventListener('click', confirmDeleteTeam);
            document.getElementById('closeDeleteBtn').addEventListener('click', closeDeleteTeamModal);

            // 二维码
            document.getElementById('generateQRBtn').addEventListener('click', generateShareQR);
            document.getElementById('copyShareBtn').addEventListener('click', copyShareLink);

            // 导出导入
            document.getElementById('exportBtn').addEventListener('click', exportAllData);
            document.getElementById('importBtn').addEventListener('click', function() {
                document.getElementById('importFile').click();
            });
            document.getElementById('importFile').addEventListener('change', handleImport);

            // 新建团队弹窗回车
            document.getElementById('newTeamNameInput').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    confirmAddTeam();
                }
            });

            // 保存版本弹窗回车
            document.getElementById('versionNoteInput').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    confirmSaveVersion();
                }
            });

            // 点击弹窗外部关闭
            document.getElementById('addTeamModal').addEventListener('click', function(e) {
                if (e.target === this) closeAddTeamModal();
            });
            document.getElementById('deleteTeamModal').addEventListener('click', function(e) {
                if (e.target === this) closeDeleteTeamModal();
            });
            document.getElementById('saveVersionModal').addEventListener('click', function(e) {
                if (e.target === this) closeSaveVersionModal();
            });
            document.getElementById('viewVersionModal').addEventListener('click', function(e) {
                if (e.target === this) closeViewVersionModal();
            });

            console.log('✅ 所有事件绑定完成');
        }

        // ============================================================
        //  初始化
        // ============================================================

        // 检测URL加载数据
        function loadDataFromURL() {
            var params = new URLSearchParams(window.location.search);
            var loadData = params.get('load');
            if (loadData) {
                try {
                    var decoded = decodeURIComponent(loadData);
                    var data = JSON.parse(decoded);
                    if (data.teams && data.currentTeamId !== undefined) {
                        if (!data.versions) data.versions = {};
                        if (confirm('检测到数据链接，是否导入？\n\n将覆盖当前所有数据！')) {
                            saveAppData(data);
                            showToast('✅ 数据已从链接导入');
                            window.history.replaceState({}, document.title, window.location.pathname);
                            renderAll();
                            return true;
                        } else {
                            window.history.replaceState({}, document.title, window.location.pathname);
                        }
                    }
                } catch (e) { console.error('解析失败:', e); }
            }
            return false;
        }

        var dataLoaded = loadDataFromURL();
        var isFillMode = initFillMode();

        if (!isFillMode) {
            renderAll();
            bindEvents();
            console.log('✅ 系统初始化完成 - 多版本记录模式');
            if (dataLoaded) console.log('✅ 已从URL加载数据');
        } else {
            console.log('✅ 扫码填报模式');
        }
    </script>
