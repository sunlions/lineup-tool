        function captainSelectGender(gender) {
            captainSelectedGender = gender;
            captainSelected = [];

            var btnMale = document.getElementById('captainGenderMale');
            var btnFemale = document.getElementById('captainGenderFemale');
            if (btnMale) btnMale.className = 'gender-btn' + (gender === 'male' ? ' active-male' : '');
            if (btnFemale) btnFemale.className = 'gender-btn' + (gender === 'female' ? ' active-female' : '');

            var display = document.getElementById('captainGenderDisplay');
            if (display) {
                if (gender === 'male') display.textContent = '已选择：换下 ♂ 男队员';
                else display.textContent = '已选择：换下 ♀ 女队员';
            }

            var team = captainTeamData;
            if (team) {
                var fillData = team.fillData || { steps: [], currentCourt: [], usedPlayers: [], completed: false };
                var grid = document.getElementById('captainMemberGrid');
                if (grid) {
                    var availablePlayers = [];
                    var usedPlayers = fillData.usedPlayers || [];
                    for (var i = 0; i < team.members.length; i++) {
                        if (usedPlayers.indexOf(team.members[i].name) === -1) {
                            availablePlayers.push(team.members[i]);
                        }
                    }
                    var filtered = [];
                    for (var i = 0; i < availablePlayers.length; i++) {
                        if (availablePlayers[i].gender === gender) {
                            filtered.push(availablePlayers[i]);
                        }
                    }
                    var html = '';
                    if (filtered.length === 0) {
                        html = '<span class="text-muted text-sm">没有符合条件的队员</span>';
                    } else {
                        for (var i = 0; i < filtered.length; i++) {
                            var p = filtered[i];
                            var icon = p.gender === 'male' ? '♂' : '♀';
                            html += '<span class="member-option" onclick="captainSelectPlayer(\'' + p.name + '\', \'' + p
                                .gender + '\')" data-name="' + p.name + '">' + p.name + ' ' + icon + '</span>';
                        }
                    }
                    grid.innerHTML = html;
                }
            }

            var status = document.getElementById('captainStatus');
            if (status) status.textContent = '请选择要上场的队员';
            var btn = document.getElementById('captainConfirmBtn');
            if (btn) btn.disabled = true;
        }

        function captainSelectPlayer(name, gender) {
            var team = captainTeamData;
            if (!team) return;

            var fillData = team.fillData || { steps: [], currentCourt: [], usedPlayers: [], completed: false };
            var isFirstStep = fillData.steps.length === 0;

            if (isFirstStep) {
                var existing = captainSelected.find(function(p) { return p.name === name; });
                if (existing) {
                    captainSelected = captainSelected.filter(function(p) { return p.name !== name; });
                } else {
                    var sameGender = captainSelected.find(function(p) { return p.gender === gender; });
                    if (sameGender) {
                        captainSelected = captainSelected.filter(function(p) { return p.gender !== gender; });
                    }
                    captainSelected.push({ name: name, gender: gender });
                }

                var grid = document.getElementById('captainMemberGrid');
                if (grid) {
                    var options = grid.querySelectorAll('.member-option');
                    for (var i = 0; i < options.length; i++) {
                        var opt = options[i];
                        var optName = opt.getAttribute('data-name');
                        var isSelected = captainSelected.some(function(p) { return p.name === optName; });
                        opt.classList.toggle('selected', isSelected);
                    }
                }

                var btn = document.getElementById('captainConfirmBtn');
                var status = document.getElementById('captainStatus');
                if (btn && status) {
                    var hasMale = captainSelected.some(function(p) { return p.gender === 'male'; });
                    var hasFemale = captainSelected.some(function(p) { return p.gender === 'female'; });
                    if (hasMale && hasFemale) {
                        btn.disabled = false;
                        status.textContent = '✅ 已选 1男 + 1女';
                    } else {
                        btn.disabled = true;
                        status.textContent = '请选择 1男 + 1女';
                    }
                }
            } else {
                if (captainSelectedGender && gender !== captainSelectedGender) {
                    showToast('⚠️ 请选择 ' + (captainSelectedGender === 'male' ? '男' : '女') + ' 队员');
                    return;
                }
                var existing = captainSelected.find(function(p) { return p.name === name; });
                if (existing) {
                    captainSelected = [];
                } else {
                    captainSelected = [{ name: name, gender: gender }];
                }

                var grid = document.getElementById('captainMemberGrid');
                if (grid) {
                    var options = grid.querySelectorAll('.member-option');
                    for (var i = 0; i < options.length; i++) {
                        var opt = options[i];
                        var optName = opt.getAttribute('data-name');
                        var isSelected = captainSelected.some(function(p) { return p.name === optName; });
                        opt.classList.toggle('selected', isSelected);
                    }
                }

                var btn = document.getElementById('captainConfirmBtn');
                var status = document.getElementById('captainStatus');
                if (btn && status) {
                    if (captainSelected.length === 1) {
                        btn.disabled = false;
                        status.textContent = '✅ 已选 ' + captainSelected[0].name;
                    } else {
                        btn.disabled = true;
                        status.textContent = '请选择要上场的队员';
                    }
                }
            }
        }

        async function captainConfirmStep() {
            var team = captainTeamData;
            if (!team) { showToast('⚠️ 数据错误，请重新扫码'); return; }

            var fillData = team.fillData || { steps: [], currentCourt: [], usedPlayers: [], completed: false };
            var isFirstStep = fillData.steps.length === 0;

            if (captainSelected.length === 0) {
                showToast('⚠️ 请先选择队员');
                return;
            }

            var currentCourt = fillData.currentCourt || [];
            var usedPlayers = fillData.usedPlayers || [];
            var steps = fillData.steps || [];
            var stepNum = steps.length + 1;

            var newCourt = [];

            if (isFirstStep) {
                var male = captainSelected.find(function(p) { return p.gender === 'male'; });
                var female = captainSelected.find(function(p) { return p.gender === 'female'; });
                if (!male || !female) { showToast('⚠️ 请选择 1男 + 1女'); return; }
                newCourt = [male, female];
                usedPlayers = [male.name, female.name];
                steps.push({
                    step: stepNum,
                    action: '首发',
                    onCourt: [{ name: male.name, gender: male.gender }, { name: female.name, gender: female.gender }],
                    substitutedOut: null,
                    substitutedIn: null
                });
            } else {
                var selected = captainSelected[0];
                var toReplace = null;
                for (var i = 0; i < currentCourt.length; i++) {
                    if (currentCourt[i].gender === selected.gender) {
                        toReplace = currentCourt[i];
                        break;
                    }
                }
                if (!toReplace) {
                    showToast('⚠️ 场上没有同性别队员可换');
                    return;
                }

                newCourt = [];
                for (var i = 0; i < currentCourt.length; i++) {
                    if (currentCourt[i].name !== toReplace.name) {
                        newCourt.push(currentCourt[i]);
                    }
                }
                newCourt.push(selected);
                usedPlayers.push(selected.name);

                steps.push({
                    step: stepNum,
                    action: '换人',
                    onCourt: newCourt.map(function(p) { return { name: p.name, gender: p.gender }; }),
                    substitutedOut: toReplace.name,
                    substitutedIn: selected.name
                });
            }

            fillData.currentCourt = newCourt;
            fillData.usedPlayers = usedPlayers;
            fillData.steps = steps;

            var allMembers = team.members;
            var allUsed = true;
            for (var i = 0; i < allMembers.length; i++) {
                if (usedPlayers.indexOf(allMembers[i].name) === -1) { allUsed = false; break; }
            }
            if (allUsed && steps.length > 0) {
                fillData.completed = true;
            }

            // 保存到云端
            try {
                await saveLineupToCloud(team.teamId, fillData);
                captainSelected = [];
                captainSelectedGender = null;
                showToast('✅ 第 ' + stepNum + ' 步确认完成');

                var params = new URLSearchParams(window.location.search);
                var fillParam = params.get('fill');
                if (fillParam) {
                    var data = JSON.parse(decodeURIComponent(fillParam));
                    data.fillData = fillData;
                    var encoded = encodeURIComponent(JSON.stringify(data));
                    window.location.href = window.location.pathname + '?fill=' + encoded;
                } else {
                    location.reload();
                }
            } catch (e) {
                showToast('⚠️ 保存失败: ' + e.message);
            }
        }

        function renderCaptainCompletedView(team, fillData) {
            var html = '<div class="card" style="max-width:600px;margin:0 auto;">';
            html += '<div class="flex-between">';
            html += '<div><h1>🎉 排阵完成</h1>';
            html += '<p class="subtitle">' + team.teamName + '</p></div>';
            html += '<span class="badge badge-green">已完成</span>';
            html += '</div>';

            html += '<div style="margin-top:12px;">';
            for (var i = 0; i < fillData.steps.length; i++) {
                var s = fillData.steps[i];
                html += '<div class="lineup-step-card">';
                html += '<div class="step-header">';
                html += '<span class="step-number">第 ' + s.step + ' 步</span>';
                html += '<span class="step-action ' + (s.action === '首发' ? 'start' : '') + '">' +
                    (s.action === '首发' ? '🌟 首发' : '🔄 换人') + '</span>';
                html += '</div>';
                html += '<div class="court-players">';
                for (var j = 0; j < s.onCourt.length; j++) {
                    var p = s.onCourt[j];
                    html += '<span class="court-player ' + p.gender + '">' + p.name + ' ' + (p.gender === 'male' ? '♂' :
                        '♀') + '</span>';
                }
                html += '</div>';
                if (s.substitutedOut) {
                    html += '<div class="sub-info">⬇ ' + s.substitutedOut + ' 下场 → ⬆ ' + s.substitutedIn + ' 上场</div>';
                }
                html += '</div>';
            }
            html += '</div>';

            html += '<div style="margin-top:16px;padding:12px;background:#f0fff4;border-radius:10px;text-align:center;font-size:13px;color:#276749;">';
            html += '✅ 所有 ' + team.members.length + ' 名队员都已上场<br>';
            html += '💡 此页面为只读视图';
            html += '</div>';

            html += '</div>';
            return html;
        }

        // ============================================================
        //  ===== 第十部分：团队管理（云端同步） =====
        // ============================================================

        async function confirmAddTeam() {
            var input = document.getElementById('newTeamNameInput');
            if (!input) return;
            var name = input.value.trim();
            if (!name) { showToast('请输入名称'); return; }

            var cache = getCachedData();
            for (var i = 0; i < cache.teams.length; i++) {
                if (cache.teams[i].name === name) { showToast('名称已存在'); return; }
            }

            try {
                await addTeamToCloud(name);
                await syncFromCloud();
                renderTeams();
                renderMembers();
                renderFillPage();
                renderDataPage();
                closeAddTeamModal();
                showToast('✅ 已创建 "' + name + '"');
            } catch (e) {
                showToast('⚠️ 创建失败: ' + e.message);
            }
        }

        async function deleteTeam(teamId) {
            try {
                await deleteTeamFromCloud(teamId);
                await syncFromCloud();

                var config = getAppData();
                var cache = getCachedData();
                if (cache.teams.length > 0 && config.currentTeamId === teamId) {
                    config.currentTeamId = cache.teams[0]._id;
                    saveAppData(config);
                }

                renderTeams();
                renderMembers();
                renderFillPage();
                renderDataPage();

                var qrContainer = document.getElementById('qrcode');
                if (qrContainer) qrContainer.innerHTML = '';
                var shareLink = document.getElementById('shareLink');
                if (shareLink) shareLink.value = '';

                showToast('✅ 已删除');
            } catch (e) {
                showToast('⚠️ 删除失败: ' + e.message);
            }
        }

        // ============================================================
        //  ===== 第十一部分：工具函数 =====
        // ============================================================

        var pendingDeleteTeamId = null;

        function showDeleteTeamModal(teamId) {
            pendingDeleteTeamId = teamId;
            var team = getTeamById(teamId);
            var detail = document.getElementById('deleteTeamDetail');
            if (detail && team) {
                detail.textContent = '将删除「' + team.name + '」及其所有数据，不可恢复！';
            }
            document.getElementById('deleteTeamModal').classList.add('show');
        }

        function closeDeleteTeamModal() {
            document.getElementById('deleteTeamModal').classList.remove('show');
            pendingDeleteTeamId = null;
        }

        function confirmDeleteTeam() {
            if (!pendingDeleteTeamId) return;
            deleteTeam(pendingDeleteTeamId);
            closeDeleteTeamModal();
        }

        function getTeamById(teamId) {
            var cache = getCachedData();
            for (var i = 0; i < cache.teams.length; i++) {
                if (cache.teams[i]._id === teamId) {
                    return cache.teams[i];
                }
            }
            return null;
        }

        function showToast(msg) {
            var el = document.getElementById('toast');
            if (!el) return;
            el.textContent = msg;
            el.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(function() { el.classList.remove('show'); }, 3000);
        }

        var toastTimer = null;

        function switchTab(tab) {
            var tabs = document.querySelectorAll('.tab');
            for (var i = 0; i < tabs.length; i++) {
                tabs[i].classList.toggle('active', tabs[i].dataset.tab === tab);
            }
            var cards = document.querySelectorAll('.card[id^="tab-"]');
            for (var i = 0; i < cards.length; i++) {
                cards[i].classList.toggle('hidden', cards[i].id !== 'tab-' + tab);
            }
            if (tab === 'members') renderMembers();
            if (tab === 'fill') renderFillPage();
            if (tab === 'data') renderDataPage();
        }

        function renderAll() {
            renderTeams();
            renderMembers();
            renderFillPage();
            renderDataPage();
        }

        // ============================================================
        //  ===== 第十二部分：导入导出 =====
        // ============================================================

        function exportAllData() {
            var cache = getCachedData();
            var blob = new Blob([JSON.stringify(cache, null, 2)], { type: 'application/json' });
            var link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = '团队数据_' + new Date().toISOString().slice(0, 10) + '.json';
            link.click();
            showToast('✅ 导出成功');
        }

        function handleImport(event) {
            var file = event.target.files[0];
            if (!file) return;
            var reader = new FileReader();
            reader.onload = async function(e) {
                try {
                    var data = JSON.parse(e.target.result);
                    if (data.teams) {
                        if (confirm('导入将覆盖云端数据，确认？')) {
                            // 这里需要逐条导入到云端，简化处理
                            showToast('⚠️ 请使用云端同步功能');
                        }
                    } else {
                        showToast('⚠️ 无效文件');
                    }
                } catch (err) {
                    showToast('⚠️ 解析失败');
                    console.error(err);
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        // ============================================================
        //  ===== 初始化 =====
        // ============================================================

        async function init() {
            // 检查云开发连接
            var connected = await checkCloudConnection();

            // 从云端同步数据
            if (connected) {
                await syncFromCloud();
            }

            // 检查扫码填报模式
            var isFillMode = initFillMode();

            if (!isFillMode) {
                renderAll();
                console.log('✅ 系统初始化完成');
            } else {
                console.log('✅ 扫码填报模式');
            }
        }

        // 暴露全局函数
        window.addMember = addMember;
        window.removeMember = removeMember;
        window.clearTeamMembers = clearTeamMembers;
        window.loadExample = loadExample;
        window.switchTeam = switchTeam;
        window.switchTab = switchTab;
        window.showAddTeamModal = showAddTeamModal;
        window.closeAddTeamModal = closeAddTeamModal;
        window.confirmAddTeam = confirmAddTeam;
        window.exportAllData = exportAllData;
        window.handleImport = handleImport;
        window.generateShareQR = generateShareQR;
        window.copyShareLink = copyShareLink;
        window.renderFillPage = renderFillPage;
        window.renderDataPage = renderDataPage;
        window.renderMembers = renderMembers;
        window.renderTeams = renderTeams;
        window.selectFillPlayer = selectFillPlayer;
        window.confirmFillStep = confirmFillStep;
        window.resetFillData = resetFillData;
        window.exportAllFillDataCSV = exportAllFillDataCSV;
        window.showDeleteTeamModal = showDeleteTeamModal;
        window.closeDeleteTeamModal = closeDeleteTeamModal;
        window.confirmDeleteTeam = confirmDeleteTeam;
        window.deleteTeam = deleteTeam;
        window.selectReplaceGender = selectReplaceGender;
        window.captainSelectGender = captainSelectGender;
        window.captainSelectPlayer = captainSelectPlayer;
        window.captainConfirmStep = captainConfirmStep;
        window.syncFromCloud = syncFromCloud;
        window.refreshDataDisplay = refreshDataDisplay;

        // 启动
        init();
    </script>
